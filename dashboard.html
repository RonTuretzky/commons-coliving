<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My House — colive.fun</title>
  <link rel="icon" href="assets/img/logomark.png" />
  <link rel="stylesheet" href="assets/css/park.css" />
  <style>
    .inbox-card { border-color: var(--app); }
    .ib-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--paper-1); padding-top: 8px; }
    .qr-box { background: #fff; padding: 8px; border: 1px solid var(--paper-1); border-radius: 6px; flex: none; line-height: 0; }
    .qr-box svg { display: block; width: 116px; height: 116px; }
    .life-note { border-top: 1px solid var(--paper-1); padding-top: 8px; }
  </style>
</head>
<body>
  <main>
    <div class="container section" id="page" style="padding-top:36px"></div>
  </main>

  <!-- New proposal modal -->
  <div class="modal-backdrop hidden" id="modal-bg">
    <div class="modal stack" role="dialog" aria-modal="true">
      <h3 class="text-h3">New proposal</h3>
      <p class="small muted">Needs <span id="m-threshold"></span> yes votes — two-thirds of the house — then it executes itself.</p>
      <div class="field">
        <label>Kind</label>
        <div class="choice-row" id="m-kinds">
          <button type="button" class="choice on" data-kind="spend">Spend from the fund</button>
          <button type="button" class="choice" data-kind="rule">House rule</button>
          <button type="button" class="choice" data-kind="dispute">Dispute an expense</button>
        </div>
      </div>
      <div class="field"><label for="m-title">Title</label><input class="input" id="m-title" placeholder="Chest freezer for bulk buys" /></div>
      <div class="field"><label for="m-desc">Why</label><textarea class="input" id="m-desc" placeholder="Make the case in a sentence or two."></textarea></div>
      <div class="field" id="m-amount-wrap"><label for="m-amount">Amount ($)</label><input class="input" id="m-amount" type="number" min="1" placeholder="340" /></div>
      <div class="field hidden" id="m-reassign-wrap"><label for="m-reassign">Reassign to</label><select class="input" id="m-reassign"></select></div>
      <div class="row" style="justify-content:flex-end">
        <button class="park-btn ghost" id="m-cancel">Cancel</button>
        <button class="lifted sm" id="m-submit"><span class="shadow"></span><span class="face">Propose it</span></button>
      </div>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/vendor/viem.js"></script>
  <script src="assets/js/rails.js"></script>
  <script src="assets/js/qr.min.js"></script>
  <script src="assets/js/shell.js"></script>
  <script>
    Shell.render("dashboard");
    Shell.gate();
    const U = Commons.util;
    const page = document.getElementById("page");

    function member(id) { return Commons.people.get(id); }
    function firstName(id) { const p = member(id); return p ? p.name.split(" ")[0] : id; }

    function render() {
      const house = Commons.houses.mine();
      if (!house) {
        page.innerHTML = `<div class="empty stack">
          <h2 class="text-h3">You're not in a house yet</h2>
          <p>Start one, or find a crew worth joining.</p>
          <div class="row center wrap">
            <a class="lifted sm" href="create.html"><span class="shadow"></span><span class="face">Start a house</span></a>
            <a class="park-btn light" href="browse.html">Browse homes</a>
          </div></div>`;
        return;
      }

      const t = Commons.money.treasury();
      const contribs = Commons.money.contributions();
      const paidCount = contribs.filter((c) => c.paid).length;
      const bills = Commons.money.bills();
      const proposals = Commons.proposals.all();
      const open = proposals.filter((p) => p.status === "open");
      const resolved = proposals.filter((p) => p.status !== "open");
      const threshold = Commons.proposals.threshold();
      const nMembers = house.members.length;

      const stack = house.members.map((id) => Shell.avatarHtml(member(id))).join("");

      page.innerHTML = `
      <div class="stack-lg">
        <div class="row between wrap">
          <div class="stack" style="--gap:4px">
            <div class="kicker">My house</div>
            <h1 class="text-h2">${U.esc(house.name)}</h1>
            <div class="row wrap">
              <span class="pill paper">${U.esc(house.borough)}</span>
              <span class="pill paper">${U.fmtMoney(house.rent)}/mo</span>
              ${house.roomsOpen ? `<span class="pill open">${house.roomsOpen} room${house.roomsOpen > 1 ? "s" : ""} open</span>` : ""}
              <span class="pill pine">${U.esc(Commons.econ.label(house.poolModel))}</span>
            </div>
          </div>
          <span class="row" style="gap:12px"><span class="avatar-stack">${stack}</span>
            <a class="park-btn light sm" href="steward.html" title="The steward — powered by lab0r.fun">🤖 Steward · lab0r.fun</a></span>
        </div>
        <p class="text-caption muted">Money here runs on the <a href="templates.html">money system</a> the house picked — the <a href="ledger.html">ledger</a> does the remembering, so nobody has to nag.</p>

        ${(() => {
          const needChores = Commons.chores.all().length === 0;
          const needMeals = !Commons.meals.plan();
          if (!needChores && !needMeals) return "";
          return `<div class="card row between wrap" style="border-color:var(--pine);gap:12px">
            <span class="row" style="gap:10px"><span style="font-size:1.5rem">🧰</span><span>
              <strong class="display-bold">Finish setting up <span>${U.esc(house.name)}</span></strong>
              <span class="small muted" style="display:block">Chores ${needChores ? "✗" : "✓"} · Meal plan ${needMeals ? "✗" : "✓"} — two calculators and you're done.</span>
            </span></span>
            <span class="row wrap">
              ${needChores ? `<a class="lifted xs" href="chore-builder.html?setup=1"><span class="shadow"></span><span class="face">Set up chores</span></a>` : ""}
              ${needMeals ? `<a class="lifted xs ${needChores ? "stroke" : ""}" href="meals.html?setup=1"><span class="shadow"></span><span class="face">Set up meals</span></a>` : ""}
            </span>
          </div>`;
        })()}

        ${inboxHtml()}
        ${tonightHtml()}

        <div class="grid grid-3">
          <div class="card stack">
            <div class="kicker">House fund</div>
            <div><span class="text-h2 amount pos">${U.fmtMoney(t.balance)}</span></div>
            <p class="small muted">${U.fmtMoney(house.poolMonthly)}/mo each into the pool · the <a href="templates.html">${U.esc(Commons.econ.label(house.poolModel))}</a> system.</p>
            <div class="progress green"><i style="width:${Math.round((paidCount / nMembers) * 100)}%"></i></div>
            <p class="text-caption muted">${paidCount} of ${nMembers} contributions in this month. Spending moves only by two-thirds vote.</p>
          </div>

          <div class="card stack">
            <div class="kicker">Contributions</div>
            ${contribs.map((c) => {
              const p = member(c.member);
              const mine = c.member === "me" && !c.paid;
              return `<div class="row between">
                <span class="row">${Shell.avatarHtml(p, "sm")} <span class="small">${U.esc(p.name)}</span></span>
                ${c.paid ? `<span class="pill match">Paid</span>`
                  : mine ? `<button class="park-btn sm primary" data-act="pay-contrib">Pay yours</button>`
                  : `<span class="pill warn">Due</span>`}
              </div>`;
            }).join("")}
            ${paidCount === nMembers ? `<p class="text-caption muted">Everyone's in ✓</p>` : ""}
          </div>

          <div class="card stack">
            <div class="kicker">This month's bills</div>
            ${bills.map((b) => {
              const payerId = Commons.money.billPayer(b);
              const payer = member(payerId);
              const paid = Commons.money.billIsPaid(b.id);
              const mine = payerId === "me";
              const rot = Commons.money.rotationPreview(b, 4).map((r) =>
                `<span class="chip soft" style="padding:1px 8px;font-size:.72rem" title="${U.esc(member(r.payer).name)}">${U.esc(r.month)} · ${U.esc(U.initials(member(r.payer).name))}</span>`).join("");
              return `<div class="stack" style="border-top:1px solid var(--paper-1);padding-top:10px;${mine && !paid ? "background:var(--paper-main);margin-inline:-10px;padding-inline:10px;border-radius:8px" : ""}">
                <div class="row between wrap">
                  <span class="small"><strong>${U.esc(b.name)}</strong> · <span class="amount">${U.fmtMoney(b.amount)}</span> <span class="muted">due the ${b.dueDay}th</span></span>
                  ${paid ? `<span class="pill match">Paid</span>`
                    : mine ? `<button class="lifted xs" data-act="pay-bill" data-bill="${b.id}"><span class="shadow"></span><span class="face">Mark paid</span></button>`
                    : `<span class="pill warn">Waiting</span>`}
                </div>
                <div class="row" style="gap:6px"><span class="row" style="gap:6px">${Shell.avatarHtml(payer, "sm")}<span class="text-caption">${mine ? "You pay" : U.esc(firstName(payerId)) + " pays"} this month</span></span></div>
                <div class="row wrap" style="gap:4px">${rot}</div>
              </div>`;
            }).join("")}
            <p class="text-caption muted">Rotates automatically — nobody has to remember.</p>
          </div>
        </div>

        ${(() => {
          const myNet = Commons.ledger.balances()["me"] || 0;
          const plan = Commons.ledger.simplify();
          const standing = Math.abs(myNet) < 0.01 ? "You're all square" : (myNet > 0 ? `You're owed <strong class="amount pos">${U.fmtMoney(Math.abs(myNet))}</strong>` : `You owe <strong class="amount neg">${U.fmtMoney(Math.abs(myNet))}</strong>`);
          return `<a class="card clickable row between wrap" href="ledger.html">
            <span class="row"><span style="font-size:1.5rem">🧾</span><span><strong class="display-bold">The ledger</strong>
              <span class="small muted" style="display:block">${standing} across the house's shared expenses · ${plan.length ? plan.length + " payment" + (plan.length > 1 ? "s" : "") + " would square everyone" : "everyone's square"}</span></span></span>
            <span class="park-btn light sm">Open the ledger →</span>
          </a>`;
        })()}

        <div id="cloud-house"></div>

        <div class="row between wrap" style="margin-top:12px">
          <div><div class="kicker">House life</div><h2 class="text-h3">The day-to-day</h2></div>
        </div>
        <div class="grid grid-3">
          ${wallHtml()}
          ${pantryHtml()}
          ${kudosHtml()}
        </div>

        ${recruitHtml(house)}

        ${bountiesHtml(house)}

        <div class="grid grid-3">
          ${healthCardHtml()}
          ${agreementCardHtml(house)}
          ${splitCardHtml(house)}
        </div>

        <div class="row between wrap" style="margin-top:12px">
          <div>
            <div class="kicker">Decisions</div>
            <h2 class="text-h3">Proposals</h2>
          </div>
          <span class="row wrap">
            <span class="pill ink">Passes at ${threshold} of ${nMembers} — two-thirds, then it executes itself</span>
            <button class="lifted sm" data-act="new-proposal"><span class="shadow"></span><span class="face">New proposal</span></button>
          </span>
        </div>

        <div class="grid grid-2">
          ${open.length ? open.map((p) => proposalCard(p, threshold)).join("") : `<div class="empty">Nothing on the table. Beautiful, or suspicious.</div>`}
        </div>

        ${resolved.length ? `<div class="card flat stack">
          <div class="kicker">Resolved</div>
          ${resolved.map((p) => `<div class="row between wrap" style="border-top:1px solid var(--paper-1);padding-top:8px">
            <span class="small"><strong>${U.esc(p.title)}</strong>${p.amount ? ` · <span class="amount">${U.fmtMoney(p.amount)}</span>` : ""}</span>
            <span class="row">
              ${p.status === "passed" ? `<span class="pill match">Passed</span>` : `<span class="pill conflict">Rejected</span>`}
              ${p.executed ? `<span class="text-caption muted">paid from the fund</span>` : ""}
              <span class="text-caption muted">${p.resolvedAt ? U.fmtDate(p.resolvedAt) : ""}</span>
            </span>
          </div>`).join("")}
        </div>` : ""}

        <div class="row center" style="margin-top:16px">
          <a class="park-btn ghost sm" href="moveout.html">Planning to move out? →</a>
        </div>
      </div>`;

      wire();
      renderRecruitQr();
    }

    function proposalCard(p, threshold) {
      const yes = Object.entries(p.votes).filter(([, v]) => v);
      const no = Object.entries(p.votes).filter(([, v]) => v === false);
      const iVoted = "me" in p.votes;
      const kindPill = p.kind === "spend"
        ? `<span class="pill pine">${U.fmtMoney(p.amount)} from the fund</span>`
        : p.kind === "dispute"
          ? `<span class="pill warn">Dispute — reassigns to ${U.esc(firstName(p.reassignTo || ""))}</span>`
          : p.kind === "agreement"
            ? `<span class="pill pine">Agreement amendment</span>`
            : `<span class="pill paper">House rule</span>`;
      return `<div class="card stack">
        <div class="row between wrap">${kindPill}<span class="text-caption muted">${U.esc(firstName(p.proposer))} · ${U.relDate(p.createdAt)}</span></div>
        <h3 class="text-h4">${U.esc(p.title)}</h3>
        <p class="small muted">${U.esc(p.desc)}</p>
        <div class="row between wrap">
          <span class="row" style="gap:2px">
            <span class="avatar-stack">${yes.map(([id]) => Shell.avatarHtml(Commons.people.get(id), "sm")).join("")}</span>
            <span class="text-caption muted" style="margin-left:8px">${yes.length} of ${threshold} needed${no.length ? ` · ${no.length} against` : ""}</span>
          </span>
          ${iVoted
            ? ""
            : `<span class="row"><button class="park-btn sm green" data-act="vote" data-id="${p.id}" data-val="1">Yes</button>
               <button class="park-btn sm light" data-act="vote" data-id="${p.id}" data-val="0">No</button></span>`}
        </div>
        ${(() => {
          // one device, passed around the table — housemates cast their votes here
          const pending = Commons.houses.mine().members.filter((m) => m !== "me" && !(m in p.votes));
          if (!pending.length) return "";
          return `<div class="stack" style="--gap:6px;border-top:1px solid var(--paper-1);padding-top:8px">
            <span class="text-caption muted">Pass the phone — the rest of the house votes here:</span>
            <div class="row wrap" style="gap:8px">${pending.map((m) => `
              <span class="row" style="gap:4px">${Shell.avatarHtml(member(m), "sm")}
                <button class="park-btn sm green" data-act="vote" data-id="${p.id}" data-voter="${m}" data-val="1">✓</button>
                <button class="park-btn sm light" data-act="vote" data-id="${p.id}" data-voter="${m}" data-val="0">✗</button>
              </span>`).join("")}</div>
          </div>`;
        })()}
        <div class="progress"><i style="width:${Math.min(100, Math.round((yes.length / threshold) * 100))}%"></i></div>
      </div>`;
    }

    /* ---------- bounties: one-off jobs with a budget (CommuneOS task model) ---------- */
    function chainReady() {
      const cc = Commons.state.choreChain;
      return !!(cc && window.Rails && Rails.enabled && Rails.commune.available() && cc.network === Rails.netId());
    }
    function bountiesHtml(house) {
      const tasks = Commons.tasks.all();
      const open = tasks.filter((t) => t.status !== "done");
      const done = tasks.filter((t) => t.status === "done");
      const memberOpts = (skip) => house.members.filter((m) => m !== skip)
        .map((m) => `<option value="${m}">${U.esc(member(m).name)}</option>`).join("");
      const card = (t) => `
        <div class="card stack" style="--gap:8px">
          <div class="row between wrap">
            <span class="pill ${t.status === "disputed" ? "warn" : "pine"}">${t.status === "disputed" ? "In dispute" : U.fmtMoney(t.budget) + " bounty"}</span>
            <span class="text-caption muted">due ${U.fmtDate(t.dueDate)}</span>
          </div>
          <strong class="display-bold small">${U.esc(t.desc)}</strong>
          <div class="row" style="gap:8px">${Shell.avatarHtml(member(t.assignedTo), "sm")}
            <span class="text-caption muted">${t.assignedTo === "me" ? "yours to do" : U.esc(firstName(t.assignedTo)) + " has it"}</span>
            ${t.onchain ? (() => {
              const url = (window.Rails && Rails.enabled && Rails.explorerTx) ? Rails.explorerTx(t.onchain.tx) : null;
              return `<a class="pill match" style="font-size:.7rem" ${url ? `href="${url}" target="_blank" rel="noopener"` : ""}>⛓ on-chain #${t.onchain.taskId}</a>`;
            })() : ""}
          </div>
          ${t.status === "open" ? `
            <div class="row between wrap">
              <button class="park-btn sm green" data-act="task-done" data-id="${t.id}">Mark done · pays in labor credit</button>
              ${memberOpts(t.assignedTo) ? `<span class="row" style="gap:6px">
                <select class="input" data-reassign="${t.id}" style="padding:4px 8px;font-size:.78rem;width:auto">${memberOpts(t.assignedTo)}</select>
                <button class="park-btn sm light" data-act="task-dispute" data-id="${t.id}">Dispute</button>
              </span>` : ""}
            </div>` : t.status === "disputed"
              ? `<p class="text-caption muted" style="margin:0">Reassignment is on the proposal board above — the house votes, two-thirds moves it.</p>` : ""}
        </div>`;
      return `
        <div class="row between wrap" style="margin-top:12px">
          <div><div class="kicker">One-off jobs</div><h2 class="text-h3">Bounties</h2></div>
          <span class="row wrap">
            ${chainReady() ? `<span class="pill ink">⛓ dual-writing to CommuneOS</span>` : ""}
            <button class="lifted sm" data-act="task-form"><span class="shadow"></span><span class="face">Post a bounty</span></button>
          </span>
        </div>
        <div class="card stack hidden" id="task-form">
          <div class="grid grid-2">
            <div class="field"><label for="t-desc">The job</label><input class="input" id="t-desc" maxlength="90" placeholder="e.g. Fix the cellar door hinge" /></div>
            <div class="field"><label for="t-budget">Budget ($ → labor credit on completion)</label><input class="input" id="t-budget" type="number" min="0" step="5" value="25" /></div>
          </div>
          <div class="grid grid-2">
            <div class="field"><label for="t-assignee">Who takes it</label><select class="input" id="t-assignee">${house.members.map((m) => `<option value="${m}">${U.esc(member(m).name)}</option>`).join("")}</select></div>
            <div class="field"><label for="t-due">Due</label><input class="input" id="t-due" type="date" /></div>
          </div>
          <div class="row wrap">
            <button class="lifted sm green" data-act="task-add"><span class="shadow"></span><span class="face">Post it</span></button>
            <button class="park-btn ghost" data-act="task-form">Never mind</button>
          </div>
        </div>
        <div class="grid grid-3">
          ${open.length ? open.map(card).join("") : `<div class="empty" style="grid-column:1/-1">No bounties on the board — the house is either finished or procrastinating.</div>`}
        </div>
        ${done.length ? `<div class="card flat stack"><div class="kicker">Done</div>
          ${done.map((t) => `<div class="row between wrap" style="border-top:1px solid var(--paper-1);padding-top:8px">
            <span class="small"><strong>${U.esc(t.desc)}</strong> · ${U.esc(firstName(t.assignedTo))}</span>
            <span class="row"><span class="pill match">${U.fmtMoney(t.budget)} credited</span><span class="text-caption muted">${t.doneAt ? U.fmtDate(t.doneAt) : ""}</span></span>
          </div>`).join("")}</div>` : ""}`;
    }

    /* ---------- house health: the quiz-validation loop, measured ---------- */
    function healthCardHtml() {
      const m = Commons.health.metrics();
      const tone = m.choreRate >= 80 ? "pos" : m.choreRate >= 55 ? "" : "neg";
      return `<div class="card stack">
        <div class="kicker">House health</div>
        <div><span class="text-h2 amount ${tone}">${m.choreRate}%</span> <span class="small muted">of chore periods closed</span></div>
        <p class="small muted" style="margin:0">${m.checkins4w} check-in${m.checkins4w === 1 ? "" : "s"} in the last 4 weeks · ${m.laborHours}h logged · ${m.disputes ? `<span class="amount neg">${m.disputes} open dispute${m.disputes > 1 ? "s" : ""}</span>` : "no disputes"}</p>
        ${m.lowStreak >= 2 ? `<p class="small" style="margin:0;color:var(--red)">${m.lowStreak} of your last 3 check-ins were low-bandwidth — let the <a href="checkin.html">reallocator</a> lighten your week.</p>` : ""}
        <a class="park-btn light sm" href="checkin.html" style="align-self:start">Weekly check-in →</a>
      </div>`;
    }

    function agreementCardHtml(house) {
      const doc = Commons.agreementDoc.get();
      if (!doc) return `<a class="card clickable stack" href="agreement.html">
        <div class="kicker">House agreement</div>
        <strong class="display-bold">Not drafted yet</strong>
        <p class="small muted" style="margin:0">One click drafts v1 from your quiz — then the house signs it.</p>
        <span class="park-btn light sm" style="align-self:start">Draft it →</span></a>`;
      const signed = house.members.filter((m) => doc.signatures[m]).length;
      return `<a class="card clickable stack" href="agreement.html">
        <div class="kicker">House agreement</div>
        <strong class="display-bold">Version ${doc.version}</strong>
        <p class="small muted" style="margin:0">${signed} of ${house.members.length} signed${doc.notarized && doc.notarized.version === doc.version ? " · ⛓ notarized on Gnosis" : ""}</p>
        <span class="park-btn light sm" style="align-self:start">Read & sign →</span></a>`;
    }

    function splitCardHtml(house) {
      const n = house.members.length;
      const atCeiling = n >= 8;
      return `<a class="card clickable stack" href="split.html" ${atCeiling ? 'style="border-color:var(--red-1)"' : ""}>
        <div class="kicker">${atCeiling ? "At the social ceiling" : "The split protocol"}</div>
        <strong class="display-bold">${n} of ~8 people</strong>
        <p class="small muted" style="margin:0">${atCeiling
          ? "Past eight, coordination stops being free. Split while you still like each other."
          : "Houses that plan their divisions survive them. Know the protocol before you need it."}</p>
        <span class="park-btn light sm" style="align-self:start">${atCeiling ? "Plan the split →" : "How it works →"}</span></a>`;
    }

    /* ---------- "What needs you" inbox ---------- */
    function inboxHtml() {
      const items = Commons.inbox.items();
      if (!items.length) return "";
      return `<div class="card stack inbox-card">
        <div class="row between wrap">
          <div><div class="kicker">What needs you</div><h2 class="text-h3" style="margin:0">${items.length} thing${items.length > 1 ? "s" : ""} waiting on you</h2></div>
          <span class="pill ink">only you can clear these</span>
        </div>
        <div class="stack" style="--gap:8px">${items.map(inboxRow).join("")}</div>
      </div>`;
    }
    function inboxRow(it) {
      const btn = {
        chore: `<button class="park-btn sm green" data-act="ib-chore" data-id="${it.choreId}" data-period="${it.period}">Mark done</button>`,
        bill: `<button class="park-btn sm green" data-act="ib-bill" data-id="${it.billId}">Pay</button>`,
        contribution: `<button class="park-btn sm green" data-act="ib-contrib">Pay in</button>`,
        vote: `<span class="row" style="gap:4px"><button class="park-btn sm green" data-act="ib-vote" data-id="${it.proposalId}" data-val="1">Yes</button><button class="park-btn sm light" data-act="ib-vote" data-id="${it.proposalId}" data-val="0">No</button></span>`,
        cook: `<a class="park-btn sm light" href="meals.html#tonight">See headcount</a>`,
        dinner: `<span class="row" style="gap:4px"><button class="park-btn sm green" data-act="ib-dinner" data-val="in">In</button><button class="park-btn sm light" data-act="ib-dinner" data-val="out">Out</button></span>`,
        cover: `<button class="park-btn sm green" data-act="ib-cover" data-id="${it.coverId}">I've got it</button>`,
      }[it.action] || "";
      return `<div class="ib-row"><span class="row" style="gap:8px"><span style="font-size:1.15rem">${it.icon}</span><span class="small">${U.esc(it.text)}</span></span>${btn}</div>`;
    }

    /* ---------- "Eating in tonight?" ---------- */
    function tonightHtml() {
      const t = Commons.dinner.tonight();
      if (!t) return "";
      const tally = Commons.dinner.tally(t.date);
      const mine = Commons.dinner.myRSVP(t.date);
      const cookName = t.cook === "me" ? "You're" : firstName(t.cook) + " is";
      return `<div class="card stack" style="--gap:10px">
        <div class="row between wrap">
          <span class="row" style="gap:10px"><span style="font-size:1.5rem">🍽️</span><span>
            <strong class="display-bold">Eating in tonight?</strong>
            <span class="small muted" style="display:block">${cookName} cooking · ${tally.plates} plate${tally.plates === 1 ? "" : "s"} so far${tally.pending.length ? ` · ${tally.pending.length} yet to say` : ""}</span>
          </span></span>
          <span class="row" style="gap:6px">
            <button class="park-btn sm ${mine && mine.status === "in" ? "green" : "light"}" data-act="dn-in">In${mine && mine.status === "in" && mine.guests ? " +" + mine.guests : ""}</button>
            <button class="park-btn sm ${mine && mine.status === "out" ? "primary" : "light"}" data-act="dn-out">Out</button>
            <a class="park-btn sm light" href="meals.html#tonight">Details</a>
          </span>
        </div>
      </div>`;
    }

    /* ---------- House life: wall, pantry, kudos ---------- */
    function wallHtml() {
      const posts = Commons.wall.all().slice(0, 3);
      const tagMap = {}; Commons.wall.TAGS.forEach((t) => { tagMap[t.id] = t; });
      return `<div class="card stack">
        <div class="row between"><div class="kicker">House wall</div><a class="park-btn light sm" href="wall.html">Open →</a></div>
        ${posts.length ? posts.map((p) => {
          const tg = tagMap[p.tag] || tagMap.fyi;
          return `<div class="row life-note" style="gap:8px">${Shell.avatarHtml(member(p.by), "sm")}
            <span class="small"><span title="${tg.label}">${tg.emoji}</span> ${U.esc(p.text)}${p.pinned ? ` <span class="pill paper" style="font-size:.62rem">📌</span>` : ""}</span></div>`;
        }).join("") : `<p class="small muted" style="margin:0">Nothing on the wall yet — post a heads-up.</p>`}
        <form data-wallquick class="row" style="gap:6px;margin-top:4px">
          <input class="input" name="text" placeholder="Quick heads-up for the house…" maxlength="200" style="flex:1" autocomplete="off" />
          <button class="park-btn sm primary" type="submit">Post</button>
        </form>
      </div>`;
    }
    function pantryHtml() {
      const needs = Commons.pantry.needs();
      return `<div class="card stack">
        <div class="row between"><div class="kicker">The pantry</div><a class="park-btn light sm" href="pantry.html">Open →</a></div>
        ${needs.length ? `<p class="small muted" style="margin:0">${needs.length} thing${needs.length > 1 ? "s" : ""} the house needs:</p>
          <div class="row wrap" style="gap:6px">${needs.slice(0, 6).map((x) => `<span class="chip soft xs">${U.esc(x.name)}${x.claimedBy ? ` · ${U.esc(firstName(x.claimedBy))} 🛒` : ""}</span>`).join("")}</div>`
          : `<p class="small muted" style="margin:0">Nothing needed right now — the shelves are stocked.</p>`}
        <form data-pantryquick class="row" style="gap:6px;margin-top:4px">
          <input class="input" name="name" placeholder="Add something we're low on…" maxlength="60" style="flex:1" autocomplete="off" />
          <button class="park-btn sm primary" type="submit">Add</button>
        </form>
      </div>`;
    }
    function kudosHtml() {
      const feed = Commons.kudos.feed().slice(0, 3);
      return `<div class="card stack">
        <div class="row between"><div class="kicker">Kudos</div><a class="park-btn light sm" href="checkin.html#kudos">Give thanks →</a></div>
        ${feed.length ? feed.map((k) => `<div class="small life-note">
          <strong>${U.esc(firstName(k.from))}</strong> → <strong>${U.esc(firstName(k.to))}</strong><br><span class="muted">“${U.esc(k.why)}”</span></div>`).join("")
          : `<p class="small muted" style="margin:0">No thanks logged yet — notice someone's quiet effort this week.</p>`}
      </div>`;
    }

    /* ---------- Recruiting: the public storefront share ---------- */
    function publicUrl(house) {
      return location.origin + location.pathname.replace(/[^/]*$/, "") + "house.html?id=" + encodeURIComponent(house.id) + "&public=1";
    }
    function recruitHtml(house) {
      const listed = !!house.listed;
      const url = publicUrl(house);
      return `<div class="card stack">
        <div class="row between wrap">
          <div><div class="kicker">Recruiting</div><strong class="display-bold">${house.roomsOpen ? `${house.roomsOpen} room${house.roomsOpen > 1 ? "s" : ""} open` : "Share your house"}</strong>
            <span class="small muted" style="display:block">A public page a stranger can open with no account — your vibe and their fit, never the ledger or votes.</span></div>
          <button class="park-btn sm ${listed ? "primary" : "light"}" data-act="recruit-toggle">${listed ? "Listed ✓" : "List us publicly"}</button>
        </div>
        ${listed ? `<div class="row wrap" style="gap:14px;align-items:flex-start">
          <div class="qr-box" id="recruit-qr"></div>
          <div style="flex:1;min-width:200px" class="stack">
            <div class="row wrap" style="gap:6px"><input class="input mono" readonly value="${U.esc(url)}" id="recruit-url" style="flex:1;min-width:180px" /><button class="park-btn sm light" data-act="recruit-copy">Copy</button></div>
            <div class="row wrap"><a class="park-btn sm light" href="gatherings.html?host=open-house">Host an open house →</a><a class="park-btn sm light" href="${U.esc(url)}" target="_blank" rel="noopener">Preview public page →</a></div>
          </div>
        </div>` : ""}
      </div>`;
    }
    function renderRecruitQr() {
      const box = document.getElementById("recruit-qr");
      const house = Commons.houses.mine();
      if (!box || !house || typeof qrcode === "undefined") { if (box) box.remove(); return; }
      try {
        const qr = qrcode(0, "M"); qr.addData(publicUrl(house)); qr.make();
        box.innerHTML = qr.createSvgTag({ cellSize: 3, margin: 1, scalable: true });
      } catch (e) { box.remove(); }
    }

    /* ---------- interactions ---------- */
    function wire() {
      page.querySelectorAll("[data-act]").forEach((el) => {
        el.addEventListener("click", () => {
          const act = el.dataset.act;
          if (act === "pay-contrib") {
            Commons.money.payContribution("me");
            render(); Shell.toast("Contribution in — the pool thanks you", "green");
          }
          if (act === "pay-bill") {
            Commons.money.payBill(el.dataset.bill);
            render(); Shell.toast("Marked paid — rotation moves on without you next month", "green");
          }
          if (act === "vote") {
            const before = Commons.proposals.get(el.dataset.id).status;
            const p = Commons.proposals.vote(el.dataset.id, el.dataset.voter || "me", el.dataset.val === "1");
            render();
            if (p.status === "passed" && before === "open") {
              Shell.toast(p.kind === "spend" && p.amount ? `Passed — ${U.fmtMoney(p.amount)} moved from the house fund` : "Passed — it's house law now", "green");
            } else if (p.status === "rejected" && before === "open") {
              Shell.toast("Rejected — the house has spoken");
            } else {
              Shell.toast("Vote in — waiting on the rest of the house");
            }
          }
          if (act === "new-proposal") openModal();
          if (act === "task-form") document.getElementById("task-form").classList.toggle("hidden");
          if (act === "task-add") {
            const desc = document.getElementById("t-desc").value.trim();
            if (!desc) { Shell.toast("Say what the job is"); return; }
            const due = document.getElementById("t-due").value;
            const task = Commons.tasks.add({
              desc, budget: Math.max(0, Number(document.getElementById("t-budget").value) || 0),
              assignedTo: document.getElementById("t-assignee").value,
              dueDate: due ? new Date(due + "T18:00:00").toISOString() : new Date(Date.now() + 7 * 864e5).toISOString(),
            });
            if (chainReady()) {
              const cc = Commons.state.choreChain;
              Rails.commune.createTask(cc.communeId, { budget: task.budget, desc: task.desc, dueDateMs: new Date(task.dueDate).getTime() })
                .then(({ taskId, hash }) => {
                  Commons.tasks.setOnchain(task.id, { taskId, tx: hash, network: Rails.netId() });
                  // marked done locally while the receipt was in flight? finish the chain record too
                  const cur = Commons.tasks.get(task.id);
                  if (cur && cur.status === "done") Rails.commune.markTaskDone(cc.communeId, taskId).catch(() => {});
                  const tf = document.getElementById("task-form");
                  const typing = tf && !tf.classList.contains("hidden") && document.getElementById("t-desc").value.trim();
                  if (!typing) render(); // never wipe a form someone is mid-typing in
                })
                .catch(() => Shell.toast("On-chain write didn't land — the bounty still stands locally"));
            }
            render(); Shell.toast("Bounty posted" + (chainReady() ? " — writing to CommuneOS…" : ""), "green");
          }
          if (act === "task-done") {
            const t = Commons.tasks.markDone(el.dataset.id);
            if (t && t.onchain && chainReady()) {
              Rails.commune.markTaskDone(Commons.state.choreChain.communeId, t.onchain.taskId)
                .then(() => Shell.toast("Completion logged on CommuneOS ⛓", "green"))
                .catch(() => Shell.toast("Chain log failed — done locally all the same"));
            }
            render(); Shell.toast(`Done — ${U.fmtMoney(t.budget)} in labor credit to ${t.assignedTo === "me" ? "you" : firstName(t.assignedTo)}`, "green");
          }
          if (act === "task-dispute") {
            const sel = page.querySelector(`[data-reassign="${el.dataset.id}"]`);
            const t = Commons.tasks.get(el.dataset.id);
            Commons.tasks.dispute(el.dataset.id, sel.value);
            if (t && t.onchain && chainReady()) {
              Rails.commune.disputeTask(Commons.state.choreChain.communeId, t.onchain.taskId)
                .then(({ disputeId, hash }) => { Commons.tasks.setOnchain(t.id, Object.assign({}, t.onchain, { disputeId, disputeTx: hash })); })
                .catch(() => {});
            }
            render(); Shell.toast("Dispute opened — the house votes on the proposal board", "green");
          }
          // --- inbox quick-actions ---
          if (act === "ib-chore") { Commons.chores.markDone(el.dataset.id, Number(el.dataset.period), "me"); render(); Shell.toast("Done — logged to your hours", "green"); }
          if (act === "ib-bill") { Commons.money.payBill(el.dataset.id); render(); Shell.toast("Paid — off your plate", "green"); }
          if (act === "ib-contrib") { Commons.money.payContribution("me"); render(); Shell.toast("Contribution in — the pool thanks you", "green"); }
          if (act === "ib-vote") { Commons.proposals.vote(el.dataset.id, "me", el.dataset.val === "1"); render(); Shell.toast("Vote in", "green"); }
          if (act === "ib-dinner" || act === "dn-in" || act === "dn-out") {
            const status = act === "dn-out" || el.dataset.val === "out" ? "out" : "in";
            Commons.dinner.setRSVP(status, 0); render();
            Shell.toast(status === "in" ? "You're in for dinner 🍽️" : "Noted — out tonight");
          }
          if (act === "ib-cover") { Commons.covers.claim(el.dataset.id); render(); Shell.toast("You've got it — the chore's yours this round", "green"); }
          if (act === "recruit-toggle") {
            const h = Commons.houses.mine(); h.listed = !h.listed; Commons.save(); render();
            Shell.toast(h.listed ? "Listed — your public page is live" : "Unlisted");
          }
          if (act === "recruit-copy") {
            const inp = document.getElementById("recruit-url");
            if (inp) { navigator.clipboard && navigator.clipboard.writeText(inp.value); inp.select(); Shell.toast("Public link copied — send it to a maybe-housemate", "green"); }
          }
        });
      });
      const wq = page.querySelector("[data-wallquick]");
      if (wq) wq.addEventListener("submit", (e) => {
        e.preventDefault();
        const inp = wq.querySelector('[name="text"]');
        const text = (inp.value || "").trim();
        if (!text) return;
        Commons.wall.post({ text, tag: "heads-up" }); render(); Shell.toast("Posted to the wall", "green");
      });
      const pq = page.querySelector("[data-pantryquick]");
      if (pq) pq.addEventListener("submit", (e) => {
        e.preventDefault();
        const inp = pq.querySelector('[name="name"]');
        const name = (inp.value || "").trim();
        if (!name) return;
        Commons.pantry.add({ name }); render(); Shell.toast("Added to the pantry list", "green");
      });
    }

    /* ---------- modal ---------- */
    const bg = document.getElementById("modal-bg");
    let kind = "spend";
    function openModal() {
      const house = Commons.houses.mine();
      document.getElementById("m-threshold").textContent = `${Commons.proposals.threshold()} of ${house.members.length}`;
      const sel = document.getElementById("m-reassign");
      sel.innerHTML = house.members.filter((m) => m !== "me")
        .map((m) => `<option value="${m}">${U.esc(Commons.people.get(m).name)}</option>`).join("");
      bg.classList.remove("hidden");
    }
    function closeModal() { bg.classList.add("hidden"); }
    document.getElementById("m-cancel").addEventListener("click", closeModal);
    bg.addEventListener("click", (e) => { if (e.target === bg) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
    document.getElementById("m-kinds").querySelectorAll(".choice").forEach((c) => {
      c.addEventListener("click", () => {
        kind = c.dataset.kind;
        document.getElementById("m-kinds").querySelectorAll(".choice").forEach((x) => x.classList.toggle("on", x === c));
        document.getElementById("m-amount-wrap").classList.toggle("hidden", kind === "rule");
        document.getElementById("m-reassign-wrap").classList.toggle("hidden", kind !== "dispute");
      });
    });
    document.getElementById("m-submit").addEventListener("click", () => {
      const title = document.getElementById("m-title").value.trim();
      const desc = document.getElementById("m-desc").value.trim();
      const amount = Number(document.getElementById("m-amount").value) || 0;
      if (!title) { Shell.toast("Give it a title"); return; }
      const p = { title, desc, kind, proposer: "me" };
      if (kind !== "rule") p.amount = amount || undefined;
      if (kind === "dispute") p.reassignTo = document.getElementById("m-reassign").value;
      Commons.proposals.add(p);
      closeModal();
      document.getElementById("m-title").value = ""; document.getElementById("m-desc").value = ""; document.getElementById("m-amount").value = "";
      render();
      Shell.toast(`Proposed — needs ${Commons.proposals.threshold()} of ${Commons.houses.mine().members.length}`, "green");
    });

    /* ---------- cloud house sharing ---------- */
    async function renderCloudHouse() {
      const el = document.getElementById("cloud-house");
      if (!el || !window.CloudSync) return;
      const C = window.CloudSync;
      const house = Commons.houses.mine();
      if (!house || C.available !== true) { if (el) el.innerHTML = ""; return; }
      if (!C.user) {
        el.innerHTML = `<div class="card flat row between wrap" style="gap:10px">
          <span class="small muted">☁️ Cloud sync is live — back your account with a passkey and this house can run across everyone's devices.</span>
          <a class="park-btn light sm" href="account.html">Set up in your account →</a>
        </div>`;
        return;
      }
      if (C.houseSynced()) {
        el.innerHTML = `<div class="card row between wrap" style="border-color:var(--pine);gap:10px">
          <span class="small"><span class="pill match">● Live across devices</span> Every member's phone sees the same rotations, ledger, votes, and agreement.</span>
          <span class="row wrap">
            <button class="park-btn light sm" data-cloud="invite">Invite a housemate</button>
          </span>
          <div class="stack" id="invite-out" style="width:100%"></div>
        </div>`;
        el.querySelector("[data-cloud='invite']").addEventListener("click", async () => {
          try {
            const { code } = await C.invite();
            const url = location.origin + location.pathname.replace(/[^/]*$/, "") + "join.html?code=" + code;
            const out = document.getElementById("invite-out");
            out.innerHTML = `<div class="row wrap" style="gap:8px;margin-top:8px">
              <input class="input" readonly value="${U.esc(url)}" style="flex:1;min-width:220px" id="invite-url" />
              <button class="park-btn sm light" id="invite-copy">Copy</button>
              <span class="text-caption muted">Good for 7 days — they create their account, tap the link, and they're in every rotation.</span>
            </div>`;
            document.getElementById("invite-copy").addEventListener("click", () => {
              navigator.clipboard && navigator.clipboard.writeText(url);
              document.getElementById("invite-url").select();
              Shell.toast("Invite link copied", "green");
            });
          } catch (e) { Shell.toast("Couldn't mint an invite: " + (e.message || "try again")); }
        });
        return;
      }
      el.innerHTML = `<div class="card row between wrap" style="gap:10px">
        <span class="small">☁️ <strong class="display-bold">Take ${U.esc(house.name)} online</strong>
          <span class="muted" style="display:block">Housemates join from their own phones — same ledger, same chores, same votes, no phone-passing.</span></span>
        <button class="lifted xs" data-cloud="online"><span class="shadow"></span><span class="face">Put the house online</span></button>
      </div>`;
      el.querySelector("[data-cloud='online']").addEventListener("click", async (evt) => {
        const btn = evt.currentTarget;
        btn.disabled = true;
        try {
          await CloudSync.houseOnline();
          Shell.toast("House is live across devices — mint an invite", "green");
          renderCloudHouse();
        } catch (e) {
          btn.disabled = false;
          Shell.toast("Couldn't put the house online: " + (e.message || "try again"));
        }
      });
    }
    window.addEventListener("cloud:ready", renderCloudHouse);
    window.addEventListener("cloud:change", renderCloudHouse);
    window.addEventListener("sync:update", () => { if (Shell.editing()) return; try { render(); renderCloudHouse(); } catch (e) {} });

    render();
    renderCloudHouse();
  </script>
</body>
</html>
