<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Quiz — colive.fun</title>
  <link rel="icon" href="assets/img/logomark.png" />
  <link rel="stylesheet" href="assets/css/park.css" />
  <style>
    .likert { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 22px; }
    @media (max-width: 640px) { .likert { grid-template-columns: 1fr; } }
    .likert button {
      border: 1px solid var(--ink); background: var(--paper-0); padding: 14px 8px; cursor: pointer;
      font-family: var(--display); font-weight: 500; font-size: .95rem; transition: all .12s; text-align: center;
    }
    .likert button:hover { border-color: var(--pine); background: var(--paper-1); }
    .likert button .num { display: block; font-size: 1.3rem; font-weight: 700; }
    .likert button .lab { display: block; font-size: .72rem; color: var(--grey-soft); margin-top: 4px; font-family: var(--body); }
    .lens-opts { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
    .lens-opts button {
      display: flex; align-items: center; gap: 14px; text-align: left;
      border: 1px solid var(--ink); background: var(--paper-0); padding: 14px 18px; cursor: pointer; transition: all .12s;
      font-size: .98rem;
    }
    .lens-opts button:hover { border-color: var(--pine); background: var(--paper-1); }
    .lens-opts .dots { font-family: var(--display); letter-spacing: 2px; color: var(--pine); flex: none; }
    .qnum { font-family: var(--display); font-weight: 500; color: var(--grey-soft); font-size: .9rem; }
    .private-note { background: var(--ink); color: var(--paper-1); border-radius: 999px; display: inline-block;
      padding: 4px 14px; font-size: .78rem; font-family: var(--display); }
    .agreement { background: var(--paper-0); border: 1px dashed var(--pine); border-radius: 12px; padding: 18px 20px; }
    .agreement li { margin-left: 18px; margin-top: 8px; font-size: .95rem; }
    .dots-scale { font-family: var(--display); letter-spacing: 2px; color: var(--pine); }
  </style>
</head>
<body>
  <main>
    <div class="container narrow section" id="page" style="padding-top:36px"></div>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/shell.js"></script>
  <script>
    Shell.render("quiz");
    const U = Commons.util;
    const Q = Commons.quizV2;
    const page = document.getElementById("page");
    const BOROUGHS = ["Bed-Stuy", "Bushwick", "Crown Heights", "Greenpoint", "Gowanus", "Red Hook", "Ridgewood", "Sunset Park", "Bay Ridge", "Beacon, NY"];

    /* ---------- flow: intro → rhythms(10) → lenses(5) → character(8+2+1, private)
       → hard lines → basics → results. Evidence-based v2 — see quiz-v2-proposal.html ---------- */
    let mode = "advanced"; // 'simple' (the quick 12) or 'advanced' (the full 30)
    const answers = { rhythms: {}, lenses: {}, character: {}, svo: {}, voice: null, hard: [], hardNone: false, basics: {}, simple: [] };
    const stepsFor = () => mode === "simple"
      ? Commons.QUIZ.length + 2
      : Q.RHYTHM_ITEMS.length + Q.LENSES.length + Q.CHARACTER_ITEMS.length + Q.SVO_ITEMS.length + 1 + 2;
    let totalSteps = stepsFor();
    let stepsDone = 0;

    function progressHtml(section) {
      const pct = Math.round((stepsDone / totalSteps) * 100);
      return `<div class="row between" style="margin-bottom:8px">
        <a href="#" id="back-link" class="small" style="color:var(--grey-soft)">← Back</a>
        <span class="qnum">${U.esc(section)}</span>
      </div>
      <div class="progress"><i style="width:${Math.max(4, pct)}%"></i></div>`;
    }

    /* ---------- stage machinery ---------- */
    const history = [];
    let current = { kind: "intro", i: 0 };

    function go(next) {
      history.push(JSON.parse(JSON.stringify(current)));
      current = next;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function back() {
      if (!history.length) return;
      current = history.pop();
      stepsDone = Math.max(0, stepsDone - 1);
      render();
    }

    function afterRhythm(i) {
      stepsDone++;
      if (i + 1 < Q.RHYTHM_ITEMS.length) go({ kind: "rhythm", i: i + 1 });
      else go({ kind: "lensIntro" });
    }
    function afterLens(i) {
      stepsDone++;
      if (i + 1 < Q.LENSES.length) go({ kind: "lens", i: i + 1 });
      else go({ kind: "charIntro" });
    }
    function afterChar(i) {
      stepsDone++;
      if (i + 1 < Q.CHARACTER_ITEMS.length) go({ kind: "char", i: i + 1 });
      else go({ kind: "svo", i: 0 });
    }
    function afterSvo(i) {
      stepsDone++;
      if (i + 1 < Q.SVO_ITEMS.length) go({ kind: "svo", i: i + 1 });
      else go({ kind: "voice" });
    }

    /* ---------- renderers ---------- */
    function render() {
      const k = current.kind;
      if (k === "intro") return renderIntro();
      if (k === "simple") return renderSimple(current.i);
      if (k === "rhythm") return renderRhythm(current.i);
      if (k === "lensIntro") return renderLensIntro();
      if (k === "lens") return renderLens(current.i);
      if (k === "charIntro") return renderCharIntro();
      if (k === "char") return renderChar(current.i);
      if (k === "svo") return renderSvo(current.i);
      if (k === "voice") return renderVoice();
      if (k === "hard") return renderHard();
      if (k === "basics") return renderBasics();
      if (k === "results") return renderResults();
    }

    function renderIntro() {
      page.innerHTML = `
      <div class="stack-lg">
        <div>
          <div class="kicker">The questionnaire</div>
          <h1 class="text-h2">Two ways in.</h1>
          <p class="lede" style="margin-top:12px">Both end with fit bands, your hard lines kept private, and a drafted
          house agreement. One is a coffee break; the other is the real instrument.</p>
        </div>
        <div class="grid grid-2">
          <div class="card stack" style="border:2px solid var(--paper-2)">
            <div class="row between"><span style="font-size:2rem">⚡</span><span class="pill paper">~3 minutes</span></div>
            <h2 class="text-h4">The quick quiz</h2>
            <p class="small muted">Twelve either/ors, the fun ones — mystery fridge containers, couch philosophy.
            Your rhythm and structure profiles get <em>estimated</em> from it.</p>
            <button class="lifted sm stroke" id="start-simple"><span class="shadow"></span><span class="face">Start the quick one</span></button>
          </div>
          <div class="card stack" style="border:2px solid var(--pine)">
            <div class="row between"><span style="font-size:2rem">🔬</span><span class="row" style="gap:6px"><span class="pill pine">~6 minutes</span><span class="pill match">recommended</span></span></div>
            <h2 class="text-h4">The full quiz</h2>
            <p class="small muted">Thirty evidence-based items: your <strong>rhythms</strong> (sleep, mess, noise, guests),
            the <strong>five lenses</strong> of house structure, and a private <strong>character check</strong> only you ever see.</p>
            <button class="lifted sm"  id="start-adv"><span class="shadow"></span><span class="face">Start the full one</span></button>
          </div>
        </div>
        <p class="text-caption muted center-text">No match percentages at the end — fit bands with reasons. The science made us do it.</p>
      </div>`;
      document.getElementById("start-adv").addEventListener("click", () => { mode = "advanced"; totalSteps = stepsFor(); go({ kind: "rhythm", i: 0 }); });
      document.getElementById("start-simple").addEventListener("click", () => { mode = "simple"; totalSteps = stepsFor(); answers.simple = []; go({ kind: "simple", i: 0 }); });
      keyHandler = null;
    }

    /* ---------- the quick quiz (v1, restored) ---------- */
    function renderSimple(i) {
      const q = Commons.QUIZ[i];
      page.innerHTML = `
      <div class="card" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml(`Quick quiz · ${i + 1} / ${Commons.QUIZ.length}`)}
        <h2 class="text-h3" style="margin-top:18px">${U.esc(q.q)}</h2>
        <div class="lens-opts">
          ${q.a.map((o, n) => `<button data-v="${n}"><span class="dots">${n + 1}</span><span>${U.esc(o.t)}</span></button>`).join("")}
        </div>
        <p class="text-caption muted" style="margin-top:14px">Pick the closest truth — or press <strong>1–${q.a.length}</strong>.</p>
      </div>`;
      page.querySelectorAll("[data-v]").forEach((b) => b.addEventListener("click", () => pickSimple(i, Number(b.dataset.v))));
      keyHandler = (n) => { if (n >= 1 && n <= q.a.length) pickSimple(i, n - 1); };
      wireBack();
    }
    function pickSimple(i, n) {
      answers.simple[i] = Commons.QUIZ[i].a[n].d;
      stepsDone++;
      if (i + 1 < Commons.QUIZ.length) go({ kind: "simple", i: i + 1 });
      else go({ kind: "hard" });
    }

    function likertStage(opts) {
      page.innerHTML = `
      <div class="card" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml(opts.section)}
        ${opts.note ? `<div style="margin-top:14px">${opts.note}</div>` : ""}
        <h2 class="text-h3" style="margin-top:18px">${U.esc(opts.text)}</h2>
        <div class="likert">
          ${[1, 2, 3, 4, 5].map((n) => `
            <button data-v="${n}">
              <span class="num">${n}</span>
              <span class="lab">${n === 1 ? U.esc(opts.low) : n === 5 ? U.esc(opts.high) : n === 3 ? "in between" : "&nbsp;"}</span>
            </button>`).join("")}
        </div>
        <p class="text-caption muted" style="margin-top:14px">Pick what's true, not what's aspirational — or press <strong>1–5</strong>.</p>
      </div>`;
      page.querySelectorAll("[data-v]").forEach((b) => b.addEventListener("click", () => opts.onPick(Number(b.dataset.v))));
      keyHandler = (n) => { if (n >= 1 && n <= 5) opts.onPick(n); };
      wireBack();
    }

    function renderRhythm(i) {
      const it = Q.RHYTHM_ITEMS[i];
      likertStage({
        section: `Rhythms · ${i + 1} / ${Q.RHYTHM_ITEMS.length}`,
        text: it.text, low: it.low, high: it.high,
        onPick: (v) => { answers.rhythms[it.id] = v; afterRhythm(i); },
      });
    }

    function renderLensIntro() {
      page.innerHTML = `
      <div class="card stack" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml("Structure")}
        <div class="kicker" style="margin-top:16px">Part two</div>
        <h2 class="text-h2">How should a house run?</h2>
        <p class="lede">Five lenses, straight from the study of communities that lasted: property, governance,
        labor, membership, and how the house faces the world. Every house on colive.fun has a profile on these
        same five — structural mismatch is the thing worth knowing <strong>before</strong> anyone signs.</p>
        <button class="lifted" id="cont" style="align-self:start"><span class="shadow"></span><span class="face">Continue</span></button>
      </div>`;
      document.getElementById("cont").addEventListener("click", () => go({ kind: "lens", i: 0 }));
      keyHandler = null;
      wireBack();
    }

    function renderLens(i) {
      const l = Q.LENSES[i];
      const dots = (n) => "●".repeat(n + 1) + "○".repeat(3 - n);
      page.innerHTML = `
      <div class="card" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml(`Structure · ${i + 1} / ${Q.LENSES.length}`)}
        <div class="kicker" style="margin-top:16px">${l.emoji} ${U.esc(l.label)}</div>
        <h2 class="text-h3" style="margin-top:8px">${U.esc(l.question)}</h2>
        <div class="lens-opts">
          ${l.levels.map((lev, n) => `
            <button data-v="${n}">
              <span class="dots">${dots(n)}</span>
              <span>${U.esc(lev)}</span>
            </button>`).join("")}
        </div>
        <p class="text-caption muted" style="margin-top:14px">Or press <strong>1–4</strong>.</p>
      </div>`;
      page.querySelectorAll("[data-v]").forEach((b) => b.addEventListener("click", () => {
        answers.lenses[l.id] = Number(b.dataset.v); afterLens(i);
      }));
      keyHandler = (n) => { if (n >= 1 && n <= 4) { answers.lenses[l.id] = n - 1; afterLens(i); } };
      wireBack();
    }

    function renderCharIntro() {
      page.innerHTML = `
      <div class="card stack" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml("Character")}
        <div style="margin-top:16px"><span class="private-note">🔒 For your eyes only</span></div>
        <h2 class="text-h2" style="margin-top:10px">The honest part</h2>
        <p class="lede">Eleven questions about how you actually are to live with. This never enters matching and is
        <strong>never shown to anyone else</strong> — it comes back to you as a private self-portrait, because the research
        says these traits matter for <em>everyone</em> you'll ever live with. Answer like nobody's watching. Nobody is.</p>
        <button class="lifted" id="cont" style="align-self:start"><span class="shadow"></span><span class="face">Continue</span></button>
      </div>`;
      document.getElementById("cont").addEventListener("click", () => go({ kind: "char", i: 0 }));
      keyHandler = null;
      wireBack();
    }

    function renderChar(i) {
      const it = Q.CHARACTER_ITEMS[i];
      likertStage({
        section: `Character · private · ${i + 1} / ${Q.CHARACTER_ITEMS.length + Q.SVO_ITEMS.length + 1}`,
        text: it.text, low: "not me", high: "very me",
        note: `<span class="private-note">🔒 private</span>`,
        onPick: (v) => { answers.character[it.id] = v; afterChar(i); },
      });
    }

    function renderSvo(i) {
      const it = Q.SVO_ITEMS[i];
      page.innerHTML = `
      <div class="card" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml(`Character · private · ${Q.CHARACTER_ITEMS.length + i + 1} / ${Q.CHARACTER_ITEMS.length + Q.SVO_ITEMS.length + 1}`)}
        <div style="margin-top:14px"><span class="private-note">🔒 private</span></div>
        <h2 class="text-h3" style="margin-top:18px">${U.esc(it.text)}</h2>
        <div class="lens-opts">
          ${it.options.map((o, n) => `<button data-v="${n}"><span class="dots">${n + 1}</span><span>${U.esc(o.t)}</span></button>`).join("")}
        </div>
      </div>`;
      page.querySelectorAll("[data-v]").forEach((b) => b.addEventListener("click", () => {
        answers.svo[it.id] = it.options[Number(b.dataset.v)].pts; afterSvo(i);
      }));
      keyHandler = (n) => { if (n >= 1 && n <= it.options.length) { answers.svo[it.id] = it.options[n - 1].pts; afterSvo(i); } };
      wireBack();
    }

    function renderVoice() {
      likertStage({
        section: `Character · private · ${Q.CHARACTER_ITEMS.length + Q.SVO_ITEMS.length + 1} / ${Q.CHARACTER_ITEMS.length + Q.SVO_ITEMS.length + 1}`,
        text: Q.CONFLICT_ITEM.text, low: "I sit on it", high: "always",
        note: `<span class="private-note">🔒 private</span>`,
        onPick: (v) => { answers.voice = v; stepsDone++; go({ kind: "hard" }); },
      });
    }

    function renderHard() {
      const selected = new Set(answers.hard);
      page.innerHTML = `
      <div class="card stack" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml("Hard lines")}
        <div class="kicker" style="margin-top:16px">After the thirty</div>
        <h2 class="text-h2">Hard lines</h2>
        <p class="lede">Private. Houses and people only ever see <strong>how many</strong> of these collide — never which.
        Negative screening is the best-evidenced thing a matcher can do, so be honest.</p>
        <div class="row wrap" id="hard-chips">
          ${Commons.DEALBREAKERS.map((d) => `<button class="chip ${selected.has(d.id) ? "on" : ""}" data-id="${d.id}">${U.esc(d.label)}</button>`).join("")}
          <button class="chip ${answers.hardNone && answers.hard.length === 0 ? "on" : ""}" data-none="1">I have none — I contain multitudes</button>
        </div>
        <button class="lifted" id="cont" style="align-self:start"><span class="shadow"></span><span class="face">Continue</span></button>
      </div>`;
      document.getElementById("hard-chips").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        if (b.dataset.none) { answers.hard = []; answers.hardNone = true; }
        else {
          answers.hardNone = false;
          const id = b.dataset.id;
          answers.hard = answers.hard.includes(id) ? answers.hard.filter((x) => x !== id) : answers.hard.concat(id);
        }
        renderHard();
      });
      document.getElementById("cont").addEventListener("click", () => { stepsDone++; go({ kind: "basics" }); });
      keyHandler = null;
      wireBack();
    }

    function renderBasics() {
      const me = Commons.me();
      const b = answers.basics;
      page.innerHTML = `
      <div class="card stack" style="padding:clamp(24px,5vw,44px)">
        ${progressHtml("The practical stuff")}
        <div class="kicker" style="margin-top:16px">Last step</div>
        <h2 class="text-h2">Money, place, and what you're after</h2>
        <div class="field">
          <label for="b-name">Name</label>
          <input class="input" id="b-name" value="${U.esc(b.name ?? me.name)}" />
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="b-borough">Where are you looking?</label>
            <select class="input" id="b-borough">${BOROUGHS.map((x) => `<option ${x === (b.borough ?? me.borough) ? "selected" : ""}>${x}</option>`).join("")}</select>
          </div>
          <div class="field">
            <label>Monthly budget · <strong class="tnum" id="b-budget-val">${U.fmtMoney(b.budget ?? me.budget)}</strong></label>
            <input type="range" class="slider" id="b-budget" min="800" max="2500" step="50" value="${b.budget ?? me.budget}" />
            <div class="range-labels"><span>$800</span><span>$2,500</span></div>
          </div>
        </div>
        <div class="field">
          <label>What are you looking for?</label>
          <div class="choice-row" id="b-seek">
            <button class="choice ${(b.seeking ?? me.seeking) === "room" ? "on" : ""}" data-v="room">A room in a house</button>
            <button class="choice ${(b.seeking ?? me.seeking) === "founding" ? "on" : ""}" data-v="founding">People to start one</button>
            <button class="choice ${(b.seeking ?? me.seeking) === "has-house" ? "on" : ""}" data-v="has-house">I have a house — filling rooms</button>
          </div>
        </div>
        <button class="lifted green" id="finish" style="align-self:start"><span class="shadow"></span><span class="face">See your results</span></button>
      </div>`;
      answers.basics = { name: b.name ?? me.name, borough: b.borough ?? me.borough, budget: b.budget ?? me.budget, seeking: b.seeking ?? me.seeking };
      page.querySelector("#b-name").addEventListener("input", (e) => { answers.basics.name = e.target.value; });
      page.querySelector("#b-borough").addEventListener("change", (e) => { answers.basics.borough = e.target.value; });
      page.querySelector("#b-budget").addEventListener("input", (e) => {
        answers.basics.budget = Number(e.target.value);
        page.querySelector("#b-budget-val").textContent = U.fmtMoney(answers.basics.budget);
      });
      page.querySelectorAll("#b-seek .choice").forEach((c) => c.addEventListener("click", () => {
        answers.basics.seeking = c.dataset.v;
        page.querySelectorAll("#b-seek .choice").forEach((x) => x.classList.toggle("on", x === c));
      }));
      document.getElementById("finish").addEventListener("click", finish);
      keyHandler = null;
      wireBack();
    }

    /* ---------- scoring & save ---------- */
    function rev(v) { return 6 - v; }
    function traitScore(trait) {
      const items = Q.CHARACTER_ITEMS.filter((i) => i.trait === trait);
      const vals = items.map((i) => (i.rev ? rev(answers.character[i.id] ?? 3) : (answers.character[i.id] ?? 3)));
      return Math.round((((vals.reduce((s, v) => s + v, 0) / vals.length) - 1) / 4) * 100);
    }
    function valuesChips(rh, ln) {
      const out = [];
      if (rh.host >= 4) out.push("Big dinners");
      if (rh.routine >= 4) out.push("Systems person");
      if (rh.kitchen >= 4) out.push("Real cook");
      if (ln.property >= 2) out.push("House fund");
      if (ln.outside >= 2) out.push("Open house energy");
      if (ln.membership >= 2) out.push("Trial stays");
      if (rh.quiet >= 4) out.push("Early nights");
      return out.slice(0, 3);
    }

    function finish() {
      stepsDone = totalSteps;
      if (mode === "simple") {
        // v1 scoring: average every nudge per dim, default 50
        const buckets = {};
        answers.simple.forEach((d) => Object.entries(d || {}).forEach(([k, v]) => (buckets[k] = buckets[k] || []).push(v)));
        const dims = {};
        Commons.DIMS.forEach((d) => {
          const arr = buckets[d.id] || [];
          dims[d.id] = arr.length ? Math.round(arr.reduce((s, v) => s + v, 0) / arr.length) : 50;
        });
        Commons.setMe({
          dims, rhythms: null, lenses: null, index: null, quizMode: "simple",
          hard: answers.hard, quizDone: true,
          name: answers.basics.name.trim() || Commons.me().name,
          borough: answers.basics.borough, budget: answers.basics.budget, seeking: answers.basics.seeking,
          values: [],
        });
        go({ kind: "results" });
        return;
      }
      const rh = answers.rhythms, ln = answers.lenses;
      const svoTotal = Object.values(answers.svo).reduce((s, v) => s + v, 0); // 0–4
      const index = {
        agree: traitScore("agree"), consc: traitScore("consc"),
        stab: traitScore("stab"), honest: traitScore("honest"),
        svo: svoTotal >= 3 ? "prosocial" : svoTotal >= 2 ? "mixed" : "self-directed",
        voice: answers.voice ?? 3,
      };
      const dims = Commons.dimsFromV2(rh, ln);
      Commons.setMe({
        rhythms: rh, lenses: ln, index, dims, quizMode: "advanced",
        hard: answers.hard, quizDone: true,
        name: answers.basics.name.trim() || Commons.me().name,
        borough: answers.basics.borough, budget: answers.basics.budget, seeking: answers.basics.seeking,
        values: valuesChips(rh, ln),
      });
      go({ kind: "results" });
    }

    /* ---------- results ---------- */
    function renderResults() {
      const me = Commons.me();
      const arch = Commons.archetype(me.dims);
      const quick = !me.rhythms; // quick quiz → profiles are estimated from the twelve
      const rh = me.rhythms || Commons.rhythmsOf(me);
      const ln = me.lenses || Commons.lensesOf(me);
      const ix = me.index;
      const dots = (n) => "●".repeat(n + 1) + "○".repeat(3 - n);

      const fits = Commons.houses.all()
        .filter((h) => h.roomsOpen > 0 && !h.members.includes("me"))
        .map((h) => ({ h, m: Commons.matchHouse(me, h) }))
        .sort((a, b) => b.m.score - a.m.score)
        .slice(0, 2);

      const lensRows = Q.LENSES.map((l) => `
        <div class="row between" style="border-top:1px solid var(--paper-1);padding-block:8px">
          <span class="small">${l.emoji} <strong>${U.esc(l.label)}</strong></span>
          <span class="row" style="gap:10px"><span class="dots-scale">${dots(ln[l.id])}</span>
          <span class="text-caption muted" style="max-width:220px;text-align:right">${U.esc(l.levels[ln[l.id]])}</span></span>
        </div>`).join("");

      const domains = [
        { label: "Sleep", ids: ["wake", "night"], emoji: "🌙" },
        { label: "Cleanliness", ids: ["dishes", "tidy", "routine"], emoji: "🧼" },
        { label: "Noise", ids: ["noise", "quiet"], emoji: "🔊" },
        { label: "Guests & hosting", ids: ["guests", "host"], emoji: "🛋️" },
        { label: "Kitchen", ids: ["kitchen"], emoji: "🍳" },
      ];
      const rhythmRows = domains.map((d) => {
        const avg = d.ids.reduce((s, id) => s + rh[id], 0) / d.ids.length;
        const pct = Math.round(((avg - 1) / 4) * 100);
        return `<div class="meter"><span class="small">${d.emoji} ${d.label}</span>
          <div class="bar"><i style="width:${pct}%"></i></div><span class="small tnum">${Math.round(avg * 10) / 10}</span></div>`;
      }).join("");

      const traitRows = !ix ? "" : Object.entries(Q.TRAIT_LABELS).map(([id, t]) => `
        <div class="meter"><span class="small">${U.esc(t.label)}</span>
          <div class="bar"><i style="width:${ix[id]}%;background:var(--sky)"></i></div><span class="small tnum">${ix[id]}</span></div>
        <p class="text-caption muted" style="margin:-2px 0 6px">${U.esc(t.desc)}</p>`).join("");

      const agreement = Commons.agreement(me);

      page.innerHTML = `
      <div class="stack-lg">
        <div class="card center-text stack" style="padding:clamp(28px,5vw,48px)">
          <div class="kicker">Your archetype</div>
          <div style="font-size:3rem">${arch.emoji}</div>
          <h1 class="text-h2">You're ${U.esc(arch.name)}</h1>
          <p class="lede">${U.esc(arch.desc)}</p>
          <p class="text-caption muted">The archetype is the fun part, not the science part. The science is below.</p>
          <div class="row center wrap">${(me.values || []).map((v) => `<span class="chip">${U.esc(v)}</span>`).join("")}</div>
        </div>

        ${fits.length ? `<div class="card stack">
          <div class="kicker">Where you'd land</div>
          ${fits.map(({ h, m }) => `
            <a class="row between wrap" href="house.html?id=${h.id}" style="border-top:1px solid var(--paper-1);padding-block:10px;text-decoration:none;color:inherit">
              <span class="row"><span class="avatar sm" style="background:${h.hue}">${U.esc(U.initials(h.name))}</span>
                <span><strong>${U.esc(h.name)}</strong> <span class="small muted">· ${U.esc(h.borough)} · ${h.roomsOpen} open</span></span></span>
              <span class="row wrap">${Shell.matchPill(m)}</span>
            </a>
            ${m.frictions.length ? `<p class="text-caption" style="margin-top:2px">⚡ ${U.esc(m.frictions[0].script)}</p>` : ""}`).join("")}
          <p class="text-caption muted">Bands, not percentages — a strong band means "worth a dinner," not destiny. That's all any questionnaire can honestly say.</p>
        </div>` : ""}

        <div class="grid grid-2">
          <div class="card stack">
            <div class="kicker">Your structure profile${quick ? " · estimated" : ""}</div>
            <p class="text-caption muted">${quick ? "Estimated from the quick quiz — the full quiz measures these directly. " : ""}The five lenses — every house carries this same profile. Big gaps are conversations, not verdicts.</p>
            ${lensRows}
          </div>
          <div class="card stack">
            <div class="kicker">Your rhythms${quick ? " · estimated" : ""}</div>
            <p class="text-caption muted">${quick ? "Estimated from the quick quiz. " : ""}The five domains roommate conflict actually comes from.</p>
            ${rhythmRows}
          </div>
        </div>

        ${ix ? `<div class="card stack" style="border-color:var(--ink)">
          <div class="row between wrap">
            <div class="kicker">Housemate index</div>
            <span class="private-note">🔒 Only you ever see this</span>
          </div>
          ${traitRows}
          <p class="small">Shared-money instinct: <strong>${U.esc(ix.svo)}</strong> · Raising issues: <strong>${ix.voice >= 4 ? "early and plainly" : ix.voice >= 3 ? "eventually" : "you tend to sit on it"}</strong></p>
          <p class="text-caption muted">These are the traits that matter for anyone you live with — measured absolutely, never matched, never shown to others. Just self-knowledge.</p>
        </div>` : `<div class="card row between wrap" style="border-color:var(--pine);gap:12px">
          <span class="row" style="gap:10px"><span style="font-size:1.5rem">🔬</span><span>
            <strong class="display-bold">Want the real instrument?</strong>
            <span class="small muted" style="display:block">The full quiz measures your rhythms directly and adds the private housemate index — six more minutes, much sharper matches.</span>
          </span></span>
          <button class="lifted xs" id="go-advanced"><span class="shadow"></span><span class="face">Take the full quiz</span></button>
        </div>`}

        <div class="card stack">
          <div class="row between wrap">
            <div class="kicker">Your house agreement, pre-drafted</div>
            <button class="park-btn light sm" id="copy-agreement">Copy</button>
          </div>
          <div class="agreement"><ul>${agreement.map((l) => `<li>${U.esc(l)}</li>`).join("")}</ul></div>
          <p class="text-caption muted">Drawn from your answers — the one tool residence-life research actually institutionalized.
          Bring it to the first dinner and edit it together.</p>
        </div>

        <div class="row center wrap">
          <a class="lifted green" href="browse.html"><span class="shadow"></span><span class="face">See homes &amp; people</span></a>
          <a class="lifted stroke" href="gatherings.html"><span class="shadow"></span><span class="face">Find a gathering</span></a>
          <button class="park-btn ghost" id="retake">Retake</button>
        </div>
      </div>`;
      document.getElementById("retake").addEventListener("click", () => location.reload());
      const adv = document.getElementById("go-advanced");
      if (adv) adv.addEventListener("click", () => {
        mode = "advanced"; totalSteps = stepsFor(); stepsDone = 0;
        go({ kind: "rhythm", i: 0 });
      });
      document.getElementById("copy-agreement").addEventListener("click", () => {
        const text = "Our house agreement (draft)\n" + agreement.map((l) => "• " + l).join("\n");
        (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject()).then(
          () => Shell.toast("Copied — bring it to the first dinner", "green"),
          () => Shell.toast("Couldn't copy — select it the old way"));
      });
      keyHandler = null;
    }

    /* ---------- keyboard + back ---------- */
    let keyHandler = null;
    document.addEventListener("keydown", (e) => {
      const n = Number(e.key);
      if (keyHandler && n >= 1 && n <= 5) keyHandler(n);
    });
    function wireBack() {
      const b = document.getElementById("back-link");
      if (b) b.addEventListener("click", (e) => { e.preventDefault(); back(); });
    }

    render();
  </script>
</body>
</html>
