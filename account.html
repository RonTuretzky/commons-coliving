<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your account — colive.fun</title>
  <link rel="icon" href="assets/img/logomark.png" />
  <link rel="stylesheet" href="assets/css/park.css" />
</head>
<body>
  <main>
    <div class="container narrow section" id="page" style="padding-top:36px"></div>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/vendor/viem.js"></script>
  <script src="assets/js/rails.js"></script>
  <script src="assets/js/shell.js"></script>
  <script>
    Shell.render("");
    const U = Commons.util;
    const page = document.getElementById("page");
    const HUES = ["#0d9488", "#16a34a", "#0284c7", "#166534", "#075985", "#513c35"];
    const BOROUGHS = ["Bed-Stuy", "Bushwick", "Crown Heights", "Greenpoint", "Gowanus", "Red Hook", "Ridgewood", "Sunset Park", "Bay Ridge", "Beacon, NY"];

    let mode = U.qp("new") ? "register" : "signin";   // "signin" | "register"
    let draft = null;

    /* ---------- avatar photo (downscaled to a small data URL) ---------- */
    function readPhoto(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const SZ = 192;
          const c = document.createElement("canvas");
          c.width = SZ; c.height = SZ;
          const side = Math.min(img.width, img.height);
          c.getContext("2d").drawImage(img, (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, SZ, SZ);
          URL.revokeObjectURL(url);
          resolve(c.toDataURL("image/jpeg", 0.82));
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("bad image")); };
        img.src = url;
      });
    }

    function startDraft() {
      const a = Commons.account.get();
      const me = Commons.me();
      draft = a
        ? { username: a.username || "", name: a.name, email: a.email || "", borough: a.borough, budget: a.budget, hue: a.hue, bio: a.bio || "", photo: a.photo || null, socials: Object.assign({}, a.socials), seeking: me.seeking || "room", discoverable: a.discoverable !== false }
        : { username: "", password: "", name: "", email: "", borough: me.borough || "Bed-Stuy", budget: me.budget || 1500, hue: HUES[0], bio: "", photo: null, socials: {}, seeking: "room", discoverable: true };
    }
    function avatarPreview() {
      if (draft.photo) return `<span class="avatar lg" style="background-image:url('${draft.photo}');background-size:cover;background-position:center;color:transparent">.</span>`;
      return `<span class="avatar lg" style="background:${draft.hue}">${U.esc(U.initials(draft.name || draft.username || "You"))}</span>`;
    }

    /* ---------- profile fields (shared by register + edit) ---------- */
    function profileFieldsHtml() {
      const T = Shell.t;
      const hueSwatches = HUES.map((h) =>
        `<button type="button" class="avatar sm" data-hue="${h}" style="background:${h};cursor:pointer;border:${draft.hue === h && !draft.photo ? "3px solid var(--ink)" : "2px solid var(--paper-0)"}">${U.esc(U.initials(draft.name || "You"))}</button>`
      ).join("");
      return `
        <div class="row wrap" style="gap:16px">
          <span id="ava-preview">${avatarPreview()}</span>
          <div class="stack" style="--gap:6px;flex:1;min-width:220px">
            <label class="park-btn light sm" style="align-self:start;cursor:pointer">📷 ${draft.photo ? T("profile.changePhoto") : T("profile.addPhoto")}
              <input id="a-photo" type="file" accept="image/*" style="display:none" />
            </label>
            ${draft.photo ? `<button type="button" class="park-btn ghost sm" id="a-photo-clear" style="align-self:start">Remove photo</button>` : `<div class="row wrap" style="gap:8px">${hueSwatches}</div>`}
          </div>
        </div>
        <div class="field">
          <label for="a-name">${T("profile.displayName")}</label>
          <input class="input" id="a-name" value="${U.esc(draft.name)}" placeholder="${T("profile.displayName.ph")}" />
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="a-borough">${T("profile.homeBase")}</label>
            <select class="input" id="a-borough">${BOROUGHS.map((b) => `<option ${b === draft.borough ? "selected" : ""}>${b}</option>`).join("")}</select>
          </div>
          <div class="field">
            <label for="a-budget">${T("profile.budget")} · <span class="tnum" id="a-budget-val">${U.fmtMoney(draft.budget)}</span></label>
            <input type="range" class="slider" id="a-budget" min="800" max="2500" step="50" value="${draft.budget}" />
            <div class="range-labels"><span>$800</span><span>$2,500</span></div>
          </div>
        </div>
        <div class="field">
          <label for="a-bio">${T("profile.oneliner")}</label>
          <input class="input" id="a-bio" value="${U.esc(draft.bio)}" placeholder="e.g. Big-dinner person, early riser, strong compost opinions." />
        </div>
        <div class="field">
          <label for="a-email">${T("profile.email")}</label>
          <input class="input" id="a-email" type="email" value="${U.esc(draft.email)}" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>${T("profile.socials")}</label>
          <div class="grid grid-2">
            <input class="input" id="a-ig" autocapitalize="none" spellcheck="false" value="${U.esc(draft.socials.instagram || "")}" placeholder="📷 Instagram @handle" />
            <input class="input" id="a-x" autocapitalize="none" spellcheck="false" value="${U.esc(draft.socials.x || "")}" placeholder="𝕏 @handle" />
            <input class="input" id="a-tg" autocapitalize="none" spellcheck="false" value="${U.esc(draft.socials.telegram || "")}" placeholder="✈️ Telegram @handle" />
            <input class="input" id="a-web" autocapitalize="none" spellcheck="false" value="${U.esc(draft.socials.website || "")}" placeholder="🔗 Website or link" />
          </div>
          <div class="help">Handles only (no need for @). Shown on your profile so housemates can find you.</div>
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="a-seeking">${T("profile.lookingFor")}</label>
            <select class="input" id="a-seeking">
              <option value="room" ${draft.seeking === "room" ? "selected" : ""}>${T("profile.seeking.room")}</option>
              <option value="founding" ${draft.seeking === "founding" ? "selected" : ""}>${T("profile.seeking.founding")}</option>
              <option value="has-house" ${draft.seeking === "has-house" ? "selected" : ""}>${T("profile.seeking.hasHouse")}</option>
            </select>
          </div>
          <div class="field">
            <label>${T("profile.discovery")}</label>
            <label class="row small" style="gap:8px;cursor:pointer;padding-top:8px"><input type="checkbox" id="a-discoverable" ${draft.discoverable ? "checked" : ""} style="accent-color:var(--pine-2)" /> ${T("profile.listMe")}</label>
            <div class="help">Off = you can still join houses by invite, but you won't show up in browse.</div>
          </div>
        </div>`;
    }
    function wireProfileFields() {
      const q = (id) => page.querySelector(id);
      if (q("#a-name")) q("#a-name").addEventListener("input", (e) => { draft.name = e.target.value; });
      if (q("#a-bio")) q("#a-bio").addEventListener("input", (e) => { draft.bio = e.target.value; });
      if (q("#a-email")) q("#a-email").addEventListener("input", (e) => { draft.email = e.target.value; });
      const soc = (id, key) => { const el = q(id); if (el) el.addEventListener("input", (e) => { draft.socials[key] = e.target.value; }); };
      soc("#a-ig", "instagram"); soc("#a-x", "x"); soc("#a-tg", "telegram"); soc("#a-web", "website");
      if (q("#a-seeking")) q("#a-seeking").addEventListener("change", (e) => { draft.seeking = e.target.value; });
      if (q("#a-discoverable")) q("#a-discoverable").addEventListener("change", (e) => { draft.discoverable = e.target.checked; });
      if (q("#a-borough")) q("#a-borough").addEventListener("change", (e) => { draft.borough = e.target.value; });
      if (q("#a-budget")) q("#a-budget").addEventListener("input", (e) => { draft.budget = Number(e.target.value); q("#a-budget-val").textContent = U.fmtMoney(draft.budget); });
      page.querySelectorAll("[data-hue]").forEach((b) => b.addEventListener("click", () => { draft.hue = b.dataset.hue; refreshAvatar(); }));
      const photo = q("#a-photo");
      if (photo) photo.addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try { draft.photo = await readPhoto(file); refreshAvatar(); Shell.toast("Looking sharp", "green"); }
        catch (err) { Shell.toast("Couldn't read that image — try another"); }
      });
      const clear = q("#a-photo-clear");
      if (clear) clear.addEventListener("click", () => { draft.photo = null; refreshAvatar(); });
    }
    function refreshAvatar() {
      // re-render only the profile-fields region without losing typed values
      const wrap = document.getElementById("profile-fields");
      if (!wrap) return;
      const keep = { name: draft.name, bio: draft.bio, email: draft.email, borough: draft.borough, budget: draft.budget, socials: draft.socials, seeking: draft.seeking, discoverable: draft.discoverable };
      wrap.innerHTML = profileFieldsHtml();
      Object.assign(draft, keep);
      wireProfileFields();
    }

    /* ---------- wallet (Gnosis, device-local key) ---------- */
    function walletCardHtml() {
      if (!window.Rails || !Rails.enabled) return "";
      if (!Rails.hasWallet()) {
        return `<div class="card stack">
          <div class="kicker">Wallet · Gnosis Chain</div>
          <p class="small">A real address on Gnosis Chain, generated on this device — it's how gathering deposits get held by code instead of by us. The key stays in this browser.</p>
          <button class="park-btn secondary sm" id="w-create" style="align-self:start">⛓ Create my wallet</button>
        </div>`;
      }
      const addr = Rails.address();
      return `<div class="card stack">
        <div class="row between wrap">
          <div class="kicker">Wallet · ${U.esc(Rails.net().label)}</div>
          <span class="pill pine">${U.esc(Rails.net().nativeSymbol)}</span>
        </div>
        <div class="row wrap" style="gap:8px">
          <code style="background:var(--paper-1);padding:6px 10px;border-radius:8px;font-size:.85rem">${U.esc(addr)}</code>
          <button class="park-btn ghost sm" id="w-copy">Copy</button>
          ${Rails.explorerAddr(addr) ? `<a class="park-btn ghost sm" target="_blank" rel="noopener" href="${Rails.explorerAddr(addr)}">Explorer ↗</a>` : ""}
        </div>
        <p class="small">Balance: <strong class="amount tnum" id="w-balance">…</strong> <span class="muted">xDai</span>
          <button class="park-btn ghost sm" id="w-refresh">refresh</button></p>
        <p class="text-caption muted">The wallet key lives in this browser (not on the server). Reveal it to back it up.</p>
        <div class="row wrap">
          <button class="park-btn light sm" id="w-export">Reveal private key</button>
          <span id="w-key-slot"></span>
        </div>
      </div>`;
    }
    function wireWallet() {
      const mk = document.getElementById("w-create");
      if (mk) mk.addEventListener("click", () => {
        Rails.ensureWallet();
        Shell.toast("Wallet created — a real Gnosis address, born on this device", "green");
        setTimeout(() => location.reload(), 500);
      });
      const cp = document.getElementById("w-copy");
      if (cp) cp.addEventListener("click", () => { navigator.clipboard && navigator.clipboard.writeText(Rails.address()); Shell.toast("Address copied"); });
      const refreshBal = async () => {
        const el = document.getElementById("w-balance");
        if (!el) return;
        try { const b = await Rails.balance(); el.textContent = Number(b).toFixed(4); }
        catch (e) { el.textContent = "rpc unreachable"; }
      };
      const rf = document.getElementById("w-refresh");
      if (rf) { rf.addEventListener("click", refreshBal); refreshBal(); }
      const ex = document.getElementById("w-export");
      if (ex) ex.addEventListener("click", () => {
        if (!ex.dataset.armed) { ex.dataset.armed = "1"; ex.textContent = "Really reveal it?"; Shell.toast("Anyone with this key owns the wallet — tap again if you're alone"); return; }
        document.getElementById("w-key-slot").innerHTML =
          `<code style="background:#fff3f2;border:1px solid var(--red-1);padding:6px 10px;border-radius:8px;font-size:.75rem;word-break:break-all">${U.esc(Rails.exportKey())}</code>`;
        ex.textContent = "Reveal private key"; delete ex.dataset.armed;
      });
    }

    /* ---------- render ---------- */
    function loadingView() {
      page.innerHTML = `<div class="card center-text stack"><div class="kicker">colive.fun</div><p class="lede">Connecting…</p></div>`;
    }

    function authView() {
      startDraft();
      const isReg = mode === "register";
      const T = Shell.t;
      page.innerHTML = `
      <div class="stack-lg">
        <div>
          <div class="kicker">${isReg ? T("auth.kicker.register") : T("auth.kicker.signin")}</div>
          <h1 class="text-h2">${isReg ? T("auth.title.register") : T("auth.title.signin")}</h1>
          <p class="lede">${isReg ? T("auth.lede.register") : T("auth.lede.signin")}</p>
        </div>
        <div class="card stack">
          <div class="field">
            <label for="a-username">${T("auth.username")}</label>
            <input class="input" id="a-username" autocomplete="username" autocapitalize="none" spellcheck="false" value="${U.esc(draft.username)}" placeholder="${T("auth.username.ph")}" />
          </div>
          <div class="field">
            <label for="a-password">${T("auth.password")}</label>
            <input class="input" id="a-password" type="password" autocomplete="${isReg ? "new-password" : "current-password"}" placeholder="${isReg ? T("auth.password.ph.register") : T("auth.password.ph.signin")}" />
          </div>
          ${isReg ? `<div id="profile-fields" class="stack">${profileFieldsHtml()}</div>` : ""}
          <div class="row wrap">
            <button class="lifted green" id="a-submit"><span class="shadow"></span><span class="face">${isReg ? T("auth.submit.register") : T("auth.submit.signin")}</span></button>
            <button class="park-btn ghost" id="a-toggle">${isReg ? T("auth.toggle.toSignin") : T("auth.toggle.toRegister")}</button>
          </div>
          <p class="text-caption muted" id="a-msg"></p>
        </div>
      </div>`;
      if (isReg) wireProfileFields();
      document.getElementById("a-toggle").addEventListener("click", () => { mode = isReg ? "signin" : "register"; authView(); });
      document.getElementById("a-username").addEventListener("input", (e) => { draft.username = e.target.value; });
      const submit = document.getElementById("a-submit");
      const doSubmit = async () => {
        const username = (document.getElementById("a-username").value || "").trim().toLowerCase();
        const password = document.getElementById("a-password").value || "";
        const msg = document.getElementById("a-msg");
        if (!username || !password) { msg.textContent = T("auth.err.missing"); return; }
        submit.disabled = true; const face = submit.querySelector(".face"); const orig = face.textContent; face.textContent = "…";
        try {
          if (isReg) {
            await CloudSync.register({ username, password, profile: {
              name: (draft.name || "").trim() || username, borough: draft.borough, budget: draft.budget,
              hue: draft.hue, bio: (draft.bio || "").trim(), email: (draft.email || "").trim() || null, photo: draft.photo,
              socials: draft.socials, seeking: draft.seeking, discoverable: draft.discoverable,
            } });
          } else {
            await CloudSync.signIn({ username, password });
          }
          const pendingJoin = localStorage.getItem("dp-pending-join");
          Shell.toast(isReg ? T("auth.toast.created") : T("auth.toast.welcome"), "green");
          setTimeout(() => {
            location.href = pendingJoin ? "join.html?code=" + encodeURIComponent(pendingJoin)
              : (Commons.me().quizDone || Commons.houses.mine() ? "dashboard.html" : "quiz.html");
          }, 500);
        } catch (e) {
          submit.disabled = false; face.textContent = orig;
          msg.textContent = (e && e.message) || "Something went wrong — try again.";
        }
      };
      submit.addEventListener("click", doSubmit);
      document.getElementById("a-password").addEventListener("keydown", (e) => { if (e.key === "Enter") doSubmit(); });
    }

    function accountView() {
      startDraft();
      const a = Commons.account.get();
      const me = Commons.me();
      const house = Commons.houses.mine();
      page.innerHTML = `
      <div class="stack-lg">
        <div class="row between wrap">
          <div>
            <div class="kicker">Your account</div>
            <h1 class="text-h2">${U.esc(a.name)}</h1>
            <p class="small muted">@${U.esc(a.username || "you")} · member since ${U.fmtDate(a.createdAt)}${house ? ` · lives at <a href="house.html?id=${house.id}">${U.esc(house.name)}</a>` : " · not in a house yet"}</p>
          </div>
          ${Shell.avatarHtml(me, "lg")}
        </div>
        <div class="row wrap">
          <a class="park-btn light sm" href="person.html?id=me">Your public profile</a>
          <a class="park-btn light sm" href="quiz.html">${me.quizDone ? "Retake the quiz" : "Take the quiz"}</a>
          ${house ? `<a class="park-btn light sm" href="checkin.html">Weekly check-in</a>` : `<a class="park-btn light sm" href="browse.html">Find your house</a>`}
        </div>
        <div class="card stack">
          <div class="kicker">Profile</div>
          <div id="profile-fields" class="stack">${profileFieldsHtml()}</div>
          <div class="row"><button class="lifted" id="a-save"><span class="shadow"></span><span class="face">${Shell.t("profile.save")}</span></button></div>
        </div>
        ${walletCardHtml()}
        <div class="card flat stack">
          <div class="kicker" style="color:var(--red)">Sign out</div>
          <div class="row between wrap">
            <span class="small">Sign out on this device. Your account and everything in it stay safe on the server — sign back in any time, anywhere.</span>
            <button class="park-btn destructive sm" id="a-signout">Sign out</button>
          </div>
        </div>
      </div>`;
      wireProfileFields();
      wireWallet();
      document.getElementById("a-save").addEventListener("click", async () => {
        const fields = { name: (draft.name || "").trim() || a.name, borough: draft.borough, budget: draft.budget, hue: draft.hue, bio: (draft.bio || "").trim(), email: (draft.email || "").trim() || null, photo: draft.photo, socials: draft.socials, discoverable: draft.discoverable };
        Commons.setMe({ seeking: draft.seeking });
        Commons.account.update(fields);
        try { await CloudSync.updateProfile(); } catch (e) { /* the debounced sync will retry */ }
        Shell.toast("Saved", "green");
        setTimeout(() => location.reload(), 400);
      });
      document.getElementById("a-signout").addEventListener("click", async () => {
        await CloudSync.signOut();
        Shell.toast("Signed out");
        setTimeout(() => { location.href = "account.html"; }, 400);
      });
    }

    function route() {
      if (!window.CloudSync || CloudSync.available === null) { loadingView(); return; }
      if (CloudSync.available === false) {
        page.innerHTML = `<div class="card center-text stack"><div class="kicker" style="color:var(--red)">Can't reach the server</div>
          <p class="lede">colive.fun needs its server to sign you in. Check your connection and reload.</p></div>`;
        return;
      }
      if (CloudSync.user) { accountView(); return; }
      // not signed in — default to register for a first-timer, sign-in if they have an account here before
      authView();
    }

    loadingView();
    window.addEventListener("cloud:ready", route);
    window.addEventListener("cloud:change", route);
    // if CloudSync already resolved before listeners attached
    if (window.CloudSync && CloudSync.available !== null) route();
  </script>
</body>
</html>
