<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Pantry — colive.fun</title>
  <link rel="icon" href="assets/img/logomark.png" />
  <link rel="stylesheet" href="assets/css/park.css" />
  <style>
    .pantry-item { border-top: 1px solid var(--paper-1); padding-top: 10px; }
    .pantry-item:first-of-type { border-top: 0; padding-top: 0; }
    .buy-box { background: var(--paper-main); border-radius: 8px; padding: 10px; margin-top: 8px; }
    .sug-chip { border: 1px dashed var(--grey); background: transparent; border-radius: 8px; padding: 3px 10px; font-size: .82rem; cursor: pointer; }
    .sug-chip:hover { border-color: var(--app); border-style: solid; }
    .money-wrap { position: relative; } .money-wrap .cur { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--grey-soft); } .money-wrap .input { padding-left: 24px; }
  </style>
</head>
<body>
  <main>
    <div class="container narrow section" id="page" style="padding-top:36px"></div>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/shell.js"></script>
  <script>
    Shell.render("dashboard");
    Shell.gate();
    const U = Commons.util;
    const page = document.getElementById("page");
    function member(id) { return Commons.people.get(id); }
    function firstName(id) { const p = member(id); return p ? p.name.split(" ")[0] : id; }
    function fundHouse() { const h = Commons.houses.mine(); return h && ["fund", "commons", "labor", "sliding"].includes(h.poolModel); }
    let runMode = false;
    const runSel = new Set();

    function render() {
      const house = Commons.houses.mine();
      if (!house) { page.innerHTML = `<div class="empty stack"><h2 class="text-h3">No house yet</h2><p>The pantry is a house thing — <a href="create.html">start one</a> or <a href="browse.html">join one</a>.</p></div>`; return; }
      const needs = Commons.pantry.needs();
      const bought = Commons.pantry.bought().slice(0, 8);
      const sug = Commons.pantry.suggestions();

      page.innerHTML = `
      <div class="stack-lg">
        <div class="stack" style="--gap:4px">
          <div class="kicker">The pantry</div>
          <h1 class="text-h2">What the house needs</h1>
          <p class="muted small">Add what's running low, claim what you'll grab so two people don't both buy milk, and tap “Bought” to drop the real cost straight into the <a href="ledger.html">ledger</a> — split, or from the house fund.</p>
        </div>

        <div class="card stack">
          <form data-add class="row wrap" style="gap:8px">
            <input class="input" name="name" placeholder="e.g. Olive oil (the big tin)" maxlength="60" style="flex:1;min-width:180px" autocomplete="off" />
            <div class="money-wrap" style="width:110px"><span class="cur">$</span><input class="input" name="est" type="number" min="0" step="1" placeholder="est." /></div>
            <button class="lifted sm" type="submit"><span class="shadow"></span><span class="face">Add</span></button>
          </form>
          ${sug.length ? `<div class="stack" style="--gap:6px"><span class="text-caption muted">Add fast:</span>
            <div class="row wrap" style="gap:6px">${sug.map((s) => `<button class="sug-chip" data-sug="${U.esc(s)}">+ ${U.esc(s)}</button>`).join("")}</div></div>` : ""}
        </div>

        <div class="card stack">
          <div class="row between wrap">
            <div><div class="kicker">Need</div><h2 class="text-h4" style="margin:0">${needs.length} item${needs.length === 1 ? "" : "s"}</h2></div>
            ${needs.length > 1 ? `<button class="park-btn sm ${runMode ? "primary" : "light"}" data-act="run-toggle">${runMode ? `Restock run · ${runSel.size} picked` : "Restock run (one receipt)"}</button>` : ""}
          </div>
          ${needs.length ? needs.map(needHtml).join("") : `<div class="empty">Nothing needed — the shelves are stocked.</div>`}
          ${runMode && runSel.size ? `<div class="buy-box stack" style="--gap:8px">
            <strong class="small">Log ${runSel.size} item${runSel.size > 1 ? "s" : ""} as one receipt</strong>
            <div class="row wrap" style="gap:8px">
              <div class="money-wrap" style="width:130px"><span class="cur">$</span><input class="input" id="run-total" type="number" min="0" step="0.01" placeholder="total" /></div>
              ${fundHouse() ? `<label class="row" style="gap:6px"><input type="checkbox" id="run-fund" /> <span class="small">From house fund</span></label>` : ""}
              <button class="lifted sm green" data-act="run-buy"><span class="shadow"></span><span class="face">Log the run</span></button>
            </div>
          </div>` : ""}
        </div>

        ${bought.length ? `<div class="card flat stack">
          <div class="kicker">Bought this week</div>
          ${bought.map((x) => `<div class="row between wrap pantry-item">
            <span class="small">${U.esc(x.name)} ${x.price ? `· <span class="amount">${U.fmtMoney(x.price)}</span>` : ""}</span>
            <span class="text-caption muted">${firstName(x.boughtBy)} · ${U.relDate(x.boughtAt)}${x.fromFund || x.restock ? "" : ""}</span>
          </div>`).join("")}
        </div>` : ""}
      </div>`;
      wire();
    }

    function needHtml(x) {
      const claimedByMe = x.claimedBy === "me";
      const claimed = x.claimedBy ? `<span class="pill paper" style="font-size:.72rem">🛒 ${U.esc(firstName(x.claimedBy))}</span>` : "";
      return `<div class="pantry-item">
        <div class="row between wrap" style="gap:8px">
          <span class="row" style="gap:8px">
            ${runMode ? `<input type="checkbox" data-pick="${x.id}" ${runSel.has(x.id) ? "checked" : ""} />` : ""}
            <span class="small"><strong>${U.esc(x.name)}</strong>${x.est ? ` <span class="muted">~${U.fmtMoney(x.est)}</span>` : ""}</span>
            ${claimed}
          </span>
          ${runMode ? "" : `<span class="row" style="gap:6px">
            <button class="park-btn sm ${claimedByMe ? "primary" : "light"}" data-act="claim" data-id="${x.id}">${claimedByMe ? "You'll grab it ✓" : "I'll grab it"}</button>
            <button class="park-btn sm green" data-act="buy-open" data-id="${x.id}">Bought</button>
            <button class="park-btn sm ghost" data-act="rm" data-id="${x.id}" title="Remove">✕</button>
          </span>`}
        </div>
        <div class="buy-box stack hidden" id="buy-${x.id}" style="--gap:8px">
          <div class="row wrap" style="gap:8px">
            <div class="money-wrap" style="width:130px"><span class="cur">$</span><input class="input" id="price-${x.id}" type="number" min="0" step="0.01" value="${x.est || ""}" placeholder="paid" /></div>
            ${fundHouse() ? `<label class="row" style="gap:6px"><input type="checkbox" id="fund-${x.id}" /> <span class="small">From house fund</span></label>` : ""}
            <button class="lifted sm green" data-act="buy" data-id="${x.id}"><span class="shadow"></span><span class="face">Log it → ledger</span></button>
            <button class="park-btn sm ghost" data-act="buy-cancel" data-id="${x.id}">Cancel</button>
          </div>
          <span class="text-caption muted">Splits equally across the house${fundHouse() ? ", or comes out of the fund" : ""}.</span>
        </div>
      </div>`;
    }

    function wire() {
      const addF = page.querySelector("[data-add]");
      if (addF) addF.addEventListener("submit", (e) => {
        e.preventDefault();
        const name = (addF.querySelector('[name="name"]').value || "").trim(); if (!name) { Shell.toast("Name it first"); return; }
        Commons.pantry.add({ name, est: addF.querySelector('[name="est"]').value });
        render(); Shell.toast("Added", "green");
      });
      page.querySelectorAll("[data-sug]").forEach((b) => b.addEventListener("click", () => { Commons.pantry.add({ name: b.dataset.sug }); render(); }));
      page.querySelectorAll("[data-pick]").forEach((c) => c.addEventListener("change", () => { c.checked ? runSel.add(c.dataset.pick) : runSel.delete(c.dataset.pick); render(); }));
      page.querySelectorAll("[data-act]").forEach((el) => el.addEventListener("click", () => {
        const act = el.dataset.act, id = el.dataset.id;
        if (act === "claim") { Commons.pantry.claim(id); render(); }
        if (act === "rm") { Commons.pantry.remove(id); render(); Shell.toast("Removed"); }
        if (act === "buy-open") { const b = document.getElementById("buy-" + id); if (b) b.classList.remove("hidden"); }
        if (act === "buy-cancel") { const b = document.getElementById("buy-" + id); if (b) b.classList.add("hidden"); }
        if (act === "buy") {
          const price = document.getElementById("price-" + id).value;
          const fund = document.getElementById("fund-" + id);
          Commons.pantry.buy(id, { price, fromFund: fund && fund.checked });
          render(); Shell.toast("Logged — it's in the ledger", "green");
        }
        if (act === "run-toggle") { runMode = !runMode; if (!runMode) runSel.clear(); render(); }
        if (act === "run-buy") {
          const total = document.getElementById("run-total").value;
          const fund = document.getElementById("run-fund");
          Commons.pantry.buyRun([...runSel], { total, fromFund: fund && fund.checked });
          runSel.clear(); runMode = false;
          render(); Shell.toast("Restock run logged as one receipt", "green");
        }
      }));
    }

    window.addEventListener("sync:update", () => { if (Shell.editing()) return; try { render(); } catch (e) {} });
    render();
  </script>
</body>
</html>
