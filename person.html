<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — colive.fun</title>
  <link rel="icon" href="assets/img/logomark.png" />
  <link rel="stylesheet" href="assets/css/park.css" />
</head>
<body>
  <main>
    <div class="container narrow section" id="page" style="padding-top:36px"></div>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/sync.js" data-cloud-sync="1"></script>
  <script>
    Shell.render("");
    const U = Commons.util;
    const page = document.getElementById("page");
    const firstName = (id) => { if (id === "me") return "You"; const pp = Commons.people.get(id); return pp ? pp.name.split(" ")[0] : id; };

    // Vouches, living references, and move-out reviews — reputation from real co-residence.
    function reputationHtml(p, isMe) {
      const rev = Commons.reviews.summaryForPerson(p.id);
      const vouches = Commons.refs.vouchesFor(p.id);
      const refs = Commons.refs.forPerson(p.id).filter((r) => r.kind === "reference");
      const iVouched = vouches.some((v) => v.by === "me");
      if (!rev && !vouches.length && !refs.length) {
        if (!isMe) return `<div class="card stack"><div class="kicker">Reputation</div>
          <p class="small muted" style="margin:0">No references or reviews yet — new to the network.</p>
          <div class="row"><button class="park-btn light sm" id="vouch-btn">Vouch for them</button></div></div>`;
        return `<div class="card stack"><div class="kicker">Reputation</div>
          <p class="small muted" style="margin:0">No references or reviews yet. Ask a former housemate to vouch for you from your <a href="account.html">account</a> — bring-your-own-trust beats a blank profile.</p></div>`;
      }
      const parts = [];
      if (rev) parts.push(`<div class="row wrap" style="gap:8px"><span class="pill match">${rev.wouldLiveAgain}% would live again</span><span class="pill paper">${rev.count} review${rev.count > 1 ? "s" : ""} · ${rev.houses} house${rev.houses > 1 ? "s" : ""} lived in</span></div>`);
      if (vouches.length) parts.push(`<div class="row wrap" style="gap:6px"><span class="pill pine">Vouched by ${vouches.length}</span>${vouches.slice(0, 8).map((v) => `<span class="chip soft xs" title="${U.esc(v.line || "")}">${U.esc(v.by === "me" ? "You" : firstName(v.by))}</span>`).join("")}</div>`);
      const refList = refs.map((r) => `<div class="text-caption" style="border-top:1px solid var(--paper-1);padding-top:8px"><strong>${U.esc(r.byName || "A housemate")}</strong> (${U.esc(r.relationship)}) — “${U.esc(r.line || "would live with them again")}” ${r.recommend ? "👍" : ""}</div>`).join("");
      return `<div class="card stack">
        <div class="kicker">Reputation</div>
        ${parts.join("")}
        ${refList ? `<div class="stack" style="--gap:6px;margin-top:4px">${refList}</div>` : ""}
        ${!isMe ? `<div class="row wrap" style="border-top:1px solid var(--paper-1);padding-top:10px"><button class="park-btn ${iVouched ? "primary" : "light"} sm" id="vouch-btn">${iVouched ? "Vouched ✓ (tap to remove)" : "Vouch for them"}</button></div>` : ""}
      </div>`;
    }

    // directory-resolved people (cloud uids aren't in the local store unless they
    // share your house) — fetched so a profile link from browse actually works
    const DIRP = {};
    async function loadDirectoryPerson() {
      try {
        const res = await fetch("/api/directory", { credentials: "same-origin" });
        if (!res.ok) return;
        const data = await res.json();
        (data.people || []).forEach((p) => { if (p && p.id) DIRP[p.id] = p; });
        (data.houses || []).forEach((h) => (h.housePeople || []).forEach((p) => { if (p && p.id) DIRP[p.id] = p; }));
      } catch (e) { /* offline — local only */ }
    }
    const resolvePerson = (id) => Commons.people.get(id) || DIRP[id] || null;

    function houseOf(personId) {
      return Commons.houses.all().find((h) => h.members.includes(personId)) || null;
    }

    function seekingPill(p) {
      if (p.seeking === "room") return `<span class="pill open">Looking for a room</span>`;
      if (p.seeking === "founding") return `<span class="pill pine">Building a founding crew</span>`;
      const h = houseOf(p.id);
      return h ? `<span class="pill paper">Housed — <a href="house.html?id=${h.id}">${U.esc(h.name)}</a></span>`
               : `<span class="pill paper">Housed</span>`;
    }

    function metersHtml(theirs, mine, withYou) {
      return Commons.DIMS.map((d) => `
        <div class="stack" style="--gap:2px">
          <div class="meter">
            <span class="small">${U.esc(d.label)}</span>
            <div class="bar">
              <i style="width:${theirs[d.id] ?? 50}%"></i>
              ${withYou ? `<i class="you" style="width:${mine[d.id] ?? 50}%"></i>` : ""}
            </div>
            <span class="small tnum">${theirs[d.id] ?? 50}</span>
          </div>
          <div class="range-labels" style="margin-left:120px"><span>${U.esc(d.low)}</span><span>${U.esc(d.high)}</span></div>
        </div>`).join("");
    }

    function socialsHtml(soc) {
      if (!soc || typeof soc !== "object") return "";
      const handle = (h) => String(h).replace(/^@+/, "").replace(/[^A-Za-z0-9_.]/g, "").slice(0, 40);
      const links = [];
      if (soc.instagram) { const h = handle(soc.instagram); if (h) links.push(`<a class="park-btn ghost sm" target="_blank" rel="noopener" href="https://instagram.com/${h}">📷 @${U.esc(h)}</a>`); }
      if (soc.x) { const h = handle(soc.x); if (h) links.push(`<a class="park-btn ghost sm" target="_blank" rel="noopener" href="https://x.com/${h}">𝕏 @${U.esc(h)}</a>`); }
      if (soc.telegram) { const h = handle(soc.telegram); if (h) links.push(`<a class="park-btn ghost sm" target="_blank" rel="noopener" href="https://t.me/${h}">✈️ @${U.esc(h)}</a>`); }
      if (soc.farcaster) { const h = handle(soc.farcaster); if (h) links.push(`<a class="park-btn ghost sm" target="_blank" rel="noopener" href="https://farcaster.xyz/${h}">🟪 @${U.esc(h)}</a>`); }
      if (soc.website) {
        let w = String(soc.website).trim();
        if (w && !/^https?:\/\//i.test(w)) w = "https://" + w;
        try { const u = new URL(w); if (u.protocol === "http:" || u.protocol === "https:") links.push(`<a class="park-btn ghost sm" target="_blank" rel="noopener" href="${U.esc(u.href)}">🔗 ${U.esc(u.hostname.replace(/^www\./, ""))}</a>`); } catch (e) { /* drop */ }
      }
      return links.length ? `<div class="row wrap" style="gap:8px;margin-top:6px">${links.join("")}</div>` : "";
    }

    function render() {
      const id = U.qp("id");
      const me = Commons.me();
      const isMe = !id || id === "me";
      const p = isMe ? me : resolvePerson(id);

      if (!p) {
        page.innerHTML = `<div class="empty stack">
          <h2 class="text-h3">Nobody by that name here</h2>
          <a class="park-btn light" href="browse.html" style="align-self:center">Back to browsing</a></div>`;
        return;
      }

      const arch = Commons.archetype(p.dims);
      const m = isMe ? null : Commons.match(me, p);

      // shared gatherings: their event list vs mine (profile events + live RSVPs)
      const mine = new Set((me.events || []).concat(Commons.state.rsvps));
      const shared = (p.events || []).filter((e) => mine.has(e))
        .map((eid) => Commons.events.get(eid)).filter(Boolean);

      const typePill = (t) => t === "mixer" ? "open" : t === "retreat" ? "pine" : t === "workday" ? "warn" : "paper";

      page.innerHTML = `
      <div class="stack-lg">
        <div class="card stack">
          <div class="row wrap" style="gap:16px">
            ${Shell.avatarHtml(p, "lg")}
            <div class="stack" style="--gap:4px;flex:1;min-width:220px">
              <h1 class="text-h3">${U.esc(p.name)}${isMe ? ` <span class="pill ink">you</span>` : ""}</h1>
              <p class="small muted">${p.age ? p.age + " · " : ""}${U.esc(p.borough)} · looks for ≤ ${U.fmtMoney(p.budget)}/mo</p>
              ${isMe && Commons.account.active() && Commons.account.get().email
                ? `<p class="small muted">✉️ ${U.esc(Commons.account.get().email)} <span class="text-caption">— housemates can reach you here</span></p>` : ""}
              <div class="row wrap">${seekingPill(p)}</div>
              ${socialsHtml(p.socials)}
            </div>
          </div>
          <div class="row wrap" style="gap:10px;border-top:1px solid var(--paper-1);padding-top:14px">
            <span style="font-size:1.8rem">${arch.emoji}</span>
            <div>
              <strong class="display-bold">${U.esc(arch.name)}</strong>
              <p class="small muted" style="margin:0">${U.esc(arch.desc)}</p>
            </div>
          </div>
        </div>

        ${isMe ? "" : `<div class="card stack">
          <div class="kicker">Compatibility</div>
          <div class="row wrap">${Shell.matchPill(m)}</div>
          <p class="text-caption muted">Dealbreakers stay private — you only ever see how many conflict, never which.</p>
          <div class="stack">${metersHtml(p.dims, me.dims, true)}</div>
          <p class="text-caption muted"><span class="dot pine"></span> them &nbsp; <span class="dot sky"></span> you</p>
        </div>`}

        <div class="card stack">
          <div class="kicker">About</div>
          <p class="text-body">${U.esc(p.blurb)}</p>
          <div class="row wrap">${(p.values || []).map((v) => `<span class="chip soft">${U.esc(v)}</span>`).join("")}</div>
        </div>

        ${reputationHtml(p, isMe)}

        <div class="card stack">
          <div class="kicker">Crossed paths</div>
          ${shared.length
            ? shared.map((e) => `<div class="row between wrap" style="border-top:1px solid var(--paper-1);padding-top:8px">
                <span class="small"><strong>${U.esc(e.title)}</strong> · ${U.fmtDate(e.when)}</span>
                <span class="pill ${typePill(e.type)}">${U.esc(e.type)}</span>
              </div>`).join("") +
              (isMe ? "" : `<p class="text-caption muted">Shared containers beat cold intros.</p>`)
            : `<p class="small muted">No shared gatherings yet — <a href="gatherings.html">fix that</a>.</p>`}
        </div>

        <div class="row wrap">
          ${isMe
            ? `<a class="lifted stroke" href="quiz.html"><span class="shadow"></span><span class="face">Retake the quiz</span></a>
               <a class="park-btn light" href="account.html">${Commons.account.exists() ? "Account settings" : "Create your account"}</a>
               <a class="park-btn light" href="browse.html">Browse homes & people</a>`
            : `<span id="connect-slot">${Commons.connects.has("person", p.id)
                ? `<button class="park-btn light" disabled>Request sent ✓</button>`
                : `<button class="lifted" id="connect"><span class="shadow"></span><span class="face">Say hi</span></button>`}</span>
               <a class="park-btn light" href="gatherings.html">See gatherings they'll be at</a>`}
        </div>
      </div>`;

      const btn = document.getElementById("connect");
      if (btn) btn.addEventListener("click", () => {
        Commons.connects.add("person", p.id);
        document.getElementById("connect-slot").innerHTML = `<button class="park-btn light" disabled>Request sent ✓</button>`;
        Shell.toast(`Sent — ${p.name.split(" ")[0]} will see your profile and match count`, "green");
      });
      const vb = document.getElementById("vouch-btn");
      if (vb && !isMe) vb.addEventListener("click", () => {
        if (Commons.refs.vouchesFor(p.id).some((v) => v.by === "me")) { Commons.refs.unvouch(p.id); Shell.toast("Vouch removed"); }
        else { Commons.refs.vouch(p.id, ""); Shell.toast(`Vouched for ${p.name.split(" ")[0]} — that means something`, "green"); }
        render();
      });
    }

    async function boot() { await loadDirectoryPerson(); render(); }
    window.addEventListener("cloud:ready", boot);
    boot();
  </script>
</body>
</html>
